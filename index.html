<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>여린교회 신앙관리</title>
<!-- PWA 설정 -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3D6A48">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="여린교회">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<!-- GAS API URL -->
<script>
  window.GAS_URL = 'https://script.google.com/macros/s/AKfycbz30pVwl4DdXvlKgj6mG_YhQlkjxI5SbG5kYycLmU9ESX7f-YA8JHFVHxNt7wa2WYfN/exec';
</script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--card:#fff;--b9:#2A3A30;--b7:#4D7659;--b5:#8A9485;--b3:#C8D4C0;--b1:#E6ECE0;--b0:#F3F6EF;--gold:#80A685;--green:#4D8556;--purple:#9080C0;--coral:#C07050;--blue:#2B74D6;--deep:#3D6A48;--accent:#B8DCB8;--shadow:0 2px 12px rgba(50,80,60,.06);--r:18px;--max:640px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard Variable','Noto Sans KR',sans-serif;background:linear-gradient(180deg,var(--bg),#F0F3EC);min-height:100vh;color:var(--b9);-webkit-tap-highlight-color:transparent;font-size:16px;line-height:1.6;overflow-x:hidden;overscroll-behavior-y:contain;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

.onboarding{position:fixed;inset:0;z-index:1000;background:var(--bg);}
.ob-slides{display:flex;width:400%;height:100%;transition:transform .4s;}
.ob-slide{width:25%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.ob-icon{font-size:56px;margin-bottom:16px;}
.ob-title{font-size:20px;font-weight:800;color:var(--b7);margin-bottom:8px;}
.ob-desc{font-size:14px;color:var(--b5);line-height:1.7;max-width:300px;}
.ob-dots{display:flex;gap:8px;margin-top:28px;}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--b3);transition:.3s;}
.ob-dot.active{background:var(--b7);width:24px;border-radius:4px;}
.ob-btns{margin-top:20px;display:flex;gap:12px;}
.ob-btn{padding:11px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;}
.ob-skip{background:0;color:var(--b5);}
.ob-next{background:var(--b7);color:#fff;}
.ob-start{background:var(--deep);color:#fff;padding:14px 44px;font-size:15px;}

.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--card);border-radius:24px;padding:28px 22px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(92,64,51,.1);text-align:center;}
.auth-box h1{font-size:18px;font-weight:800;color:var(--b7);margin-bottom:2px;}
.auth-box .sub{font-size:11px;color:var(--b5);margin-bottom:16px;}
.auth-toggle{font-size:12px;color:var(--b5);margin-top:14px;}
.auth-toggle a{color:var(--b7);font-weight:700;cursor:pointer;text-decoration:none;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:10px;}
.emoji-opt{width:40px;height:40px;border-radius:50%;border:3px solid var(--b1);background:var(--b0);font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.emoji-opt.sel{border-color:var(--b7);background:var(--b1);transform:scale(1.1);}
.error-msg{color:var(--coral);font-size:11px;margin-top:4px;min-height:14px;}

.app{display:none;}
.top-bar{background:linear-gradient(135deg,var(--deep),var(--b9));padding:18px 22px;color:#F0F5E8;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}
.top-bar-left{display:flex;align-items:center;gap:10px;cursor:pointer;}
.profile-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}

/* 사이드 메뉴 (햄버거) */
.side-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:550;opacity:0;pointer-events:none;transition:opacity .25s;}
.side-menu-overlay.open{opacity:1;pointer-events:auto;}
.side-menu{position:fixed;top:0;left:0;bottom:0;width:80%;max-width:300px;background:var(--bg);z-index:551;transform:translateX(-100%);transition:transform .28s cubic-bezier(.2,.7,.3,1);box-shadow:6px 0 24px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.side-menu.open{transform:translateX(0);}
.side-menu-hdr{padding:24px 22px 18px;background:linear-gradient(135deg,var(--deep),var(--b7));color:#fff;}
.side-menu-hdr .smh-title{font-size:18px;font-weight:900;letter-spacing:-.4px;}
.side-menu-hdr .smh-sub{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.side-menu-list{flex:1;overflow-y:auto;padding:8px 0;}
.side-menu-item{display:flex;align-items:center;gap:14px;padding:16px 22px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:15px;font-weight:600;color:var(--b9);transition:.15s;font-family:inherit;}
.side-menu-item:active{background:var(--b1);}
.side-menu-item .smi-icon{font-size:22px;width:28px;text-align:center;flex-shrink:0;}
.side-menu-item .smi-arrow{margin-left:auto;color:var(--b3);font-size:14px;}
.side-menu-divider{height:1px;background:var(--b1);margin:6px 22px;}
.side-menu-foot{padding:14px 22px;font-size:11px;color:var(--b5);text-align:center;border-top:1px solid var(--b1);}

.bottom-bar{position:fixed;bottom:12px;left:12px;right:12px;background:var(--card);border:1px solid var(--b1);border-radius:22px;box-shadow:0 6px 20px rgba(30,50,30,.08);z-index:200;padding:6px;max-width:calc(var(--max) - 24px);margin:0 auto;}
.bottom-inner{display:flex;}
.btab{flex:1;padding:10px 0;border:none;background:none;font-size:10px;color:#B0B8AA;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;transition:.2s;border-radius:16px;font-weight:700;letter-spacing:.3px;}
.btab.active{color:#fff;background:var(--b9);}
.btab .bico{font-size:22px;line-height:1;}
.badge{position:absolute;top:3px;right:calc(50% - 24px);background:var(--coral);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

.content{max-width:var(--max);margin:0 auto;padding:16px 18px 110px;}
.page{display:none;animation:fadeUp .2s;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(min-width:768px){.content{padding:20px 28px 104px;}}
@media(min-width:1024px){:root{--max:720px;}}

/* ===== 메인홈 박스 ===== */
.main-hero{padding:18px 4px 24px;}
.main-hero .greet-date{font-size:12px;color:var(--b5);letter-spacing:1px;font-weight:700;margin-bottom:4px;}
.main-hero .greet-msg{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.3;color:var(--b9);}
.main-hero .greet-msg .accent{color:var(--b7);}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.main-box{background:var(--card);border:1px solid rgba(208,216,202,.5);border-radius:20px;padding:22px 18px;cursor:pointer;transition:.18s;box-shadow:var(--shadow);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:flex-start;min-height:148px;}
.main-box:active{transform:scale(.97);}
.main-box.featured{grid-column:span 2;background:linear-gradient(135deg,var(--deep),var(--b7));color:#fff;border:none;min-height:130px;}
.main-box .mb-icon{font-size:34px;margin-bottom:10px;line-height:1;}
.main-box.featured .mb-icon{font-size:38px;}
.main-box .mb-title{font-size:15px;font-weight:800;letter-spacing:-.4px;color:var(--b9);margin-bottom:4px;}
.main-box.featured .mb-title{color:#fff;font-size:18px;}
.main-box .mb-sub{font-size:11px;color:var(--b5);font-weight:600;line-height:1.5;}
.main-box.featured .mb-sub{color:var(--accent);}
.main-box .mb-arrow{position:absolute;right:14px;top:14px;font-size:13px;color:var(--b5);font-weight:700;}
.main-box.featured .mb-arrow{color:var(--accent);}

.coming-wrap{padding:60px 24px;text-align:center;}
.coming-wrap .cw-icon{font-size:60px;margin-bottom:16px;}
.coming-wrap .cw-title{font-size:22px;font-weight:900;color:var(--b9);margin-bottom:6px;letter-spacing:-.6px;}
.coming-wrap .cw-sub{font-size:13px;color:var(--b5);line-height:1.7;margin-bottom:24px;}
.coming-wrap .cw-back{padding:12px 28px;border-radius:14px;border:1px solid var(--b3);background:var(--card);color:var(--b7);font-size:13px;font-weight:700;cursor:pointer;}

/* ===== 여린 주소록 (Phase B) ===== */
.ab-header{padding:6px 4px 14px;}
.ab-header .ab-title{font-size:24px;font-weight:900;letter-spacing:-.6px;color:var(--b9);}
.ab-header .ab-count{font-size:12px;color:var(--b5);margin-top:2px;font-weight:600;}
.ab-search-wrap{position:relative;margin-bottom:10px;}
.ab-search{width:100%;padding:13px 40px 13px 42px;border-radius:14px;border:1px solid #E0E8DC;background:var(--card);font-size:14px;outline:none;transition:.15s;box-shadow:var(--shadow);}
.ab-search:focus{border-color:var(--b7);}
.ab-search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--b5);pointer-events:none;}
.ab-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;border:none;background:var(--b1);color:var(--b5);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.ab-search-clear.show{display:flex;}
.ab-role-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.ab-role-tabs::-webkit-scrollbar{display:none;}
.ab-role-tab{padding:7px 14px;border-radius:999px;border:none;font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer;transition:.15s;}
.ab-role-tab.active{background:var(--b7);color:#fff;}
.ab-role-tab:not(.active){background:var(--b1);color:var(--b7);}
.ab-section{margin-bottom:8px;}
.ab-section-hdr{padding:6px 14px 4px;font-size:11px;font-weight:800;color:var(--b7);letter-spacing:1px;background:transparent;}
.ab-card{background:var(--card);border:1px solid rgba(208,216,202,.4);border-radius:14px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;box-shadow:0 1px 2px rgba(50,80,60,.03);}
.ab-card:active{transform:scale(.98);background:var(--b0);}
.ab-card-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--b7),var(--deep));color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.ab-card-body{flex:1;min-width:0;}
.ab-card-name{font-size:15px;font-weight:800;color:var(--b9);letter-spacing:-.3px;display:flex;align-items:center;gap:6px;}
.ab-card-role{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--b1);color:var(--b7);}
.ab-card-phone{font-size:12px;color:var(--b5);margin-top:2px;font-weight:600;}
.ab-card-arrow{font-size:14px;color:var(--b3);flex-shrink:0;}
.ab-empty{text-align:center;padding:40px 20px;color:var(--b5);font-size:13px;}
.ab-fab{position:fixed;bottom:90px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--b7),var(--deep));color:#fff;border:none;font-size:26px;font-weight:300;box-shadow:0 6px 20px rgba(61,106,72,.35);cursor:pointer;z-index:150;display:flex;align-items:center;justify-content:center;line-height:1;}
.ab-fab:active{transform:scale(.95);}
@media(min-width:768px){.ab-fab{right:calc(50% - 280px);}}

/* 연락처 상세 보기 */
.ab-detail-hero{background:linear-gradient(135deg,var(--deep),var(--b7));color:#fff;border-radius:22px;padding:28px 22px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;}
.ab-detail-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06);}
.ab-detail-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 12px;backdrop-filter:blur(6px);position:relative;z-index:1;}
.ab-detail-name{font-size:24px;font-weight:900;letter-spacing:-.6px;position:relative;z-index:1;}
.ab-detail-role{font-size:12px;color:var(--accent);font-weight:700;margin-top:4px;position:relative;z-index:1;}
.ab-action-row{display:flex;gap:8px;margin-bottom:14px;}
.ab-action-btn{flex:1;padding:12px 6px;border-radius:14px;border:none;background:var(--card);color:var(--b7);font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow);border:1px solid rgba(208,216,202,.4);text-decoration:none;transition:.15s;}
.ab-action-btn:active{transform:scale(.96);background:var(--b0);}
.ab-action-btn .ab-act-icon{font-size:20px;}
.ab-action-btn.disabled{opacity:.4;pointer-events:none;}
.ab-action-btn.primary{background:linear-gradient(135deg,var(--b7),var(--deep));color:#fff;border:none;}
.ab-info-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--b1);}
.ab-info-row:last-child{border-bottom:none;}
.ab-info-icon{width:36px;height:36px;border-radius:10px;background:var(--b0);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ab-info-body{flex:1;min-width:0;}
.ab-info-label{font-size:11px;color:var(--b5);font-weight:700;letter-spacing:.3px;margin-bottom:2px;}
.ab-info-value{font-size:14px;color:var(--b9);font-weight:600;line-height:1.5;word-break:break-all;white-space:pre-wrap;}
.ab-info-empty .ab-info-value{color:var(--b3);font-style:italic;font-weight:500;}
.ab-edit-btns{display:flex;gap:8px;margin-top:14px;}
.ab-edit-btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;}
.ab-btn-edit{background:var(--b1);color:var(--b7);}
.ab-btn-del{background:#E8D4D4;color:#6E2E2E;}

/* 폼 - 생일 양/음력 */
.bd-type-row{display:flex;gap:6px;margin-top:6px;}
.bd-type-row button{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.bd-type-row button.active{background:var(--b7);color:#fff;}
.bd-type-row button:not(.active){background:var(--b1);color:var(--b5);}

/* ===== 여린 이웃 (Phase C) ===== */
.nb-header{padding:6px 4px 14px;}
.nb-header .nb-title{font-size:24px;font-weight:900;letter-spacing:-.6px;color:var(--b9);}
.nb-header .nb-sub{font-size:13px;color:var(--b5);margin-top:4px;font-weight:600;line-height:1.5;}
.nb-cat-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.nb-cat-tabs::-webkit-scrollbar{display:none;}
.nb-cat-tab{padding:8px 14px;border-radius:999px;border:none;font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:4px;}
.nb-cat-tab.active{background:var(--b7);color:#fff;}
.nb-cat-tab:not(.active){background:var(--b1);color:var(--b7);}
.nb-cat-tab .nb-cat-cnt{font-size:10px;opacity:.75;font-weight:600;}
.nb-card{background:var(--card);border:1px solid rgba(208,216,202,.4);border-radius:18px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.nb-card:active{transform:scale(.98);}
.nb-card-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.3px;margin-bottom:8px;}
.nb-card-name{font-size:17px;font-weight:900;letter-spacing:-.5px;color:var(--b9);margin-bottom:6px;}
.nb-card-desc{font-size:13px;color:var(--b5);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;white-space:pre-wrap;}
.nb-card-foot{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--b7);font-weight:700;}
.nb-card-foot .nb-card-arrow{margin-left:auto;color:var(--b3);font-size:14px;}
.nb-empty{text-align:center;padding:50px 24px;color:var(--b5);font-size:13px;line-height:1.7;}

/* 카테고리 색상 */
.cat-mission{background:#FCE5D8;color:#A04020;}
.cat-relief{background:#E0F0E0;color:#2E5E3E;}
.cat-edu{background:#DCE6F0;color:#234A7A;}
.cat-medical{background:#F5DCE0;color:#8E2A40;}
.cat-env{background:#D8EDD0;color:#3D6A48;}
.cat-other{background:#E8E0E8;color:#5E4060;}

/* 상세 페이지 */
.nb-detail-hero{background:linear-gradient(135deg,var(--gold),#A8B898);color:#fff;border-radius:22px;padding:28px 22px;margin-bottom:14px;position:relative;overflow:hidden;}
.nb-detail-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1);}
.nb-detail-cat{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.5px;background:rgba(255,255,255,.22);color:#fff;margin-bottom:10px;position:relative;z-index:1;}
.nb-detail-name{font-size:24px;font-weight:900;letter-spacing:-.6px;line-height:1.3;position:relative;z-index:1;}
.nb-detail-actions{display:flex;gap:8px;margin-bottom:14px;}
.nb-action-btn{flex:1;padding:14px 6px;border-radius:14px;border:none;background:var(--card);color:var(--b7);font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--shadow);border:1px solid rgba(208,216,202,.4);text-decoration:none;transition:.15s;}
.nb-action-btn:active{transform:scale(.96);background:var(--b0);}
.nb-action-btn .nb-act-icon{font-size:20px;}
.nb-action-btn.disabled{opacity:.4;pointer-events:none;}
.nb-action-btn.primary{background:linear-gradient(135deg,var(--b7),var(--deep));color:#fff;border:none;}

/* ===== 재정 현황 (Phase D) ===== */
.fin-header{padding:6px 4px 14px;}
.fin-header .fin-title{font-size:24px;font-weight:900;letter-spacing:-.6px;color:var(--b9);}
.fin-header .fin-sub{font-size:13px;color:var(--b5);margin-top:4px;font-weight:600;}

.fin-month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:8px 14px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(208,216,202,.4);}
.fin-month-nav button{background:none;border:none;font-size:18px;color:var(--b7);cursor:pointer;padding:6px 10px;border-radius:8px;}
.fin-month-nav button:active{background:var(--b1);}
.fin-month-nav .fin-month-title{font-size:16px;font-weight:800;color:var(--b9);letter-spacing:-.3px;}

.fin-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fin-card{background:var(--card);border:1px solid rgba(208,216,202,.4);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);}
.fin-card-label{font-size:11px;font-weight:800;color:var(--b5);letter-spacing:.5px;margin-bottom:6px;}
.fin-card-amt{font-size:20px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1.2;}
.fin-card-amt.income{color:var(--green);}
.fin-card-amt.expense{color:var(--coral);}
.fin-card-amt.balance{color:var(--b9);}

function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getYoutubeId(url){
  if(!url)return'';
  const m=String(url).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([^&?#/]+)/);
  return m?m[1]:'';
}
function getYoutubeThumb(url){
  const id=getYoutubeId(url);
  return id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':'';
}

function gas(fn,...a){
  return fetch(window.GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({fn:fn,args:a})
  }).then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.json();
  }).then(function(r){
    if(r.error)throw new Error(r.error);
    return r.data;
  });
}

let _toastTimer=null;

  const el=document.getElementById('toast');

  el.style.display='flex';

  if(type==='success'||type==='error'){
    _toastTimer=setTimeout(function(){
      el.style.opacity='0';
      setTimeout(function(){el.style.display='none';},350);
    },type==='error'?2500:1500);
  }
}
function hideToast(){
  const el=document.getElementById('toast');
  el.style.opacity='0';
  setTimeout(function(){el.style.display='none';},300);
}

async function tryAuto(){
  const s=localStorage.getItem('yeorin_user');
  // 저장된 정보가 없으면 → 온보딩 또는 로그인 화면 표시
  if(!s){
    document.getElementById('splash').style.display='none';
    const obSeen=localStorage.getItem('yeorin_obSeen');
    if(obSeen){
      document.getElementById('loginScreen').style.display='flex';
    }else{
      document.getElementById('onboarding').style.display='block';
    }
    return;
  }
  // 저장된 정보가 있으면 → 자동 로그인 시도
  setSplashMsg('자동 로그인 중...');
  try{
    const d=JSON.parse(s);
    document.getElementById('loginName').value=d.name;
    document.getElementById('loginPw').value=d.pw;
    const r=await gas('loginUser',String(d.name),String(d.pw));
    if(r.success){
      CU=r.user;
      setSplashMsg('환영합니다, '+r.user.name+'님');
      await enterApp();
      restoreLastTab();
      // 자연스럽게 페이드아웃
      setTimeout(function(){
        const sp=document.getElementById('splash');
        sp.style.transition='opacity .35s';
        sp.style.opacity='0';
        setTimeout(function(){sp.style.display='none';},380);
      },300);
    }else{
      localStorage.removeItem('yeorin_user');
      document.getElementById('splash').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('loginBtn').textContent='로그인';
      document.getElementById('loginError').textContent='저장된 정보로 로그인할 수 없어요. 다시 입력해주세요.';
      document.getElementById('loginPw').value='';
    }
  }catch(e){
    localStorage.removeItem('yeorin_user');
    document.getElementById('splash').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('loginBtn').textContent='로그인';
  }
}
setTimeout(function(){try{tryAuto();}catch(e){}},300);

function restoreLastTab(){
  try{
    const t=localStorage.getItem('yeorin_lastTab');
    const at=parseInt(localStorage.getItem('yeorin_lastTabAt')||'0',10);
    const elapsed=Date.now()-at;
    const RESTORE_LIMIT=30*60*1000; // 30분
    // 30분 지났으면 메인홈에서 시작 (복원하지 않음)
    if(!t||!at||elapsed>RESTORE_LIMIT)return;
    if(t!=='mypage'&&t!==curTab){
      switchTab(t);
    }
  }catch(e){}
}

async function doLogin(){
  const n=document.getElementById('loginName').value.trim();
  const p=document.getElementById('loginPw').value;
  const err=document.getElementById('loginError');
  err.textContent='';
  if(!n||!p){err.textContent='이름과 비밀번호를 입력해주세요';return;}
  document.getElementById('loginBtn').textContent='로그인 중...';
  document.getElementById('onboarding').style.display='none';
  try{
    const r=await gas('loginUser',String(n),String(p));
    if(!r.success){
      err.textContent=r.error;
      document.getElementById('loginBtn').textContent='로그인';
      return;
    }
    CU=r.user;
    localStorage.setItem('yeorin_user',JSON.stringify({name:n,pw:p}));
    await enterApp();
  }catch(e){
    err.textContent='오류 발생';
    document.getElementById('loginBtn').textContent='로그인';
  }
}

function renderRx(rx,defs,type,id){
  const btns=defs.map(function(r){
    const l=rx[r.k]||[];
    const a=l.includes(CU.id);
    return '<button class="react-btn'+(a?' active':'')+'" onclick="event.stopPropagation();togRx(\''+type+'\',\''+id+'\',\''+r.k+'\')">'+r.e+' '+r.l+(l.length?' <span class="cnt">'+l.length+'</span>':'')+'</button>';
  }).join('');
  const lines=defs.map(function(r){
    const l=rx[r.k]||[];
    if(!l.length)return'';
    return r.e+' '+l.map(function(u){return escapeHtml(gm(u).name);}).join(', ');
  }).filter(function(x){return x;}).join(' · ');
  return '<div class="reaction-row">'+btns+'</div>'+(lines?'<div class="rx-names">'+lines+'</div>':'');
}

async function togRx(type,id,key){
  const arr=type==='qt'?qtPosts:prPosts;
  const it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;
  if(!it.reactions)it.reactions={};
  const wasActive=it.reactions[key]&&it.reactions[key].includes(CU.id);

  if(!it.reactions[key])it.reactions[key]=[];
  const idx=it.reactions[key].indexOf(CU.id);
  if(idx>-1)it.reactions[key].splice(idx,1);
  else it.reactions[key].push(CU.id);
  type==='qt'?renderQt():renderPrayer();

  try{
    await gas('toggleReaction',type,id,key,CU.id);
  }catch(e){
    const idx2=it.reactions[key].indexOf(CU.id);
    if(wasActive){if(idx2===-1)it.reactions[key].push(CU.id);}
    else{if(idx2>-1)it.reactions[key].splice(idx2,1);}
    type==='qt'?renderQt():renderPrayer();
    showToast('공감 저장 실패, 다시 시도해주세요','error');
  }
}

// 댓글 렌더 - c.t 본문은 c-body가 white-space:pre-wrap 가짐 (CSS에서 적용됨)
function renderCm(cm,type,id){
  const items=(cm||[]).map(function(c){
    const m=gm(c.a),own=c.a===CU.id;
    return '<div class="c-item"><div class="c-av">'+m.emoji+'</div><div class="c-body"><span class="c-name">'+escapeHtml(m.name)+'</span>'+escapeHtml(c.t)+'<span class="c-date">'+escapeHtml(c.d||'')+'</span>'+(own?'<button class="c-del" onclick="delCm(\''+c.id+'\',\''+type+'\')">삭제</button>':'')+'</div></div>';
  }).join('');
  return '<div class="comment-section">'+items+'<div class="c-input-row"><input placeholder="댓글..." id="ci-'+type+'-'+id+'"><button onclick="addCm(\''+type+'\',\''+id+'\')">등록</button></div></div>';
}

async function addCm(type,id){
  const inp=document.getElementById('ci-'+type+'-'+id);
  if(!inp||!inp.value.trim())return;
  const t=inp.value.trim();
  const arr=type==='qt'?qtPosts:prPosts;
  const it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;
  const tempId='t'+Date.now();
  if(!it.comments)it.comments=[];
  const tempCmt={id:tempId,a:CU.id,t:t,d:td()};
  it.comments.push(tempCmt);
  inp.value='';
  type==='qt'?renderQt():renderPrayer();
  try{
    const res=await gas('addComment',type,id,CU.id,t);
    if(res&&res.id){
      const cmt=it.comments.find(function(c){return c.id===tempId;});
      if(cmt)cmt.id=res.id;
    }
  }catch(e){
    it.comments=it.comments.filter(function(c){return c.id!==tempId;});
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 저장 실패, 다시 시도해주세요','error');
  }
}

async function delCm(cid,type){
  const arr=type==='qt'?qtPosts:prPosts;
  const backup=[];
  arr.forEach(function(p){
    if(p.comments){
      p.comments.forEach(function(c){
        if(c.id===cid)backup.push({postId:p.id,cmt:JSON.parse(JSON.stringify(c))});
      });
    }
  });
  arr.forEach(function(p){if(p.comments)p.comments=p.comments.filter(function(c){return c.id!==cid;});});
  type==='qt'?renderQt():renderPrayer();
  try{
    await gas('deleteComment',cid,CU.id);
  }catch(e){
    backup.forEach(function(b){
      const p=arr.find(function(x){return x.id===b.postId;});
      if(p){if(!p.comments)p.comments=[];p.comments.push(b.cmt);}
    });
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 삭제 실패, 다시 시도해주세요','error');
  }
}

function renderReading(bpSet){
  if(selBook!==null){
    const bk=BIBLE[selBook];
    const co=CC[bk.cat];
    let chs='';
    const readChs=[];
    for(let i=0;i<bk.c;i++){
      const k=selBook+'-'+i;
      const ir=bpSet.has(k);
      if(ir)readChs.push(i+1);
      const sav=savingChapters[k]?' saving':'';
      chs+='<button class="ch-btn'+sav+'" onclick="toggleCh('+selBook+','+i+')" style="background:'+(ir?co.a:'#F8F5F0')+';color:'+(ir?'#fff':'var(--b5)')+';font-weight:'+(ir?700:400)+'">'+(i+1)+'</button>';
    }

    let rangeStr='아직 없어요';
    if(readChs.length){
      const rng=[];
      let s=readChs[0],e=s;
      for(let j=1;j<readChs.length;j++){
        if(readChs[j]===e+1)e=readChs[j];
        else{rng.push(s===e?s+'장':s+'~'+e+'장');s=readChs[j];e=s;}
      }
      rng.push(s===e?s+'장':s+'~'+e+'장');
      rangeStr=rng.join(', ');
    }
    const rp=Math.round(readChs.length/bk.c*100);

    return '<button class="back-btn" onclick="selBook=null;renderBible()">← 목록</button>'
      +'<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<div style="font-size:16px;font-weight:700">'+bk.n+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:var(--b7)">'+rp+'%</div></div>'
      +'<div style="font-size:13px;color:var(--b5);margin-bottom:4px">전체 '+bk.c+'장 중 '+readChs.length+'장</div>'
      +'<div class="progress-bar-bg" style="margin-bottom:8px"><div class="progress-bar-fill" style="width:'+rp+'%;background:'+co.a+'"></div></div>'
      +'<div style="font-size:13px;color:var(--b7);background:var(--b0);padding:10px 12px;border-radius:8px;margin-bottom:12px">📖 '+rangeStr+'</div>'
      +'<div class="chapter-grid">'+chs+'</div></div>'
      +'<div id="yeorinBible"></div>'
      +'<button class="btn-dashed" style="border-color:var(--green);color:var(--green)" onclick="askYeorinBibleUI(\''+bk.n+'\')"><img class="yeorin-img" src="'+YIMG+'"> 여린이에게 물어보기</button>';
  }

  let cats='';
  CATS.forEach(function(cat){
    const bks=BIBLE.map(function(b,i){return Object.assign({},b,{idx:i});}).filter(function(b){return b.cat===cat;});
    if(!bks.length)return;
    const co=CC[cat];
    let tiles='';
    bks.forEach(function(bk){
      let br=0;
      for(let i=0;i<bk.c;i++)if(bpSet.has(bk.idx+'-'+i))br++;
      const p=Math.round(br/bk.c*100);
      tiles+='<button class="book-tile" onclick="selBook='+bk.idx+';renderBible()" style="background:'+(p===100?co.a:p>0?co.bg:'#F8F5F0')+';color:'+(p===100?'#fff':co.t)+';font-weight:'+(p>0?600:400)+'">'+bk.n+(p>0?' '+br+'/'+bk.c:'')+(p===100?' ✓':'')+(p>0&&p<100?'<div class="micro-bar" style="width:'+p+'%;background:'+co.a+'"></div>':'')+'</button>';
    });
    cats+='<div style="background:'+co.bg+'30;border-radius:10px;padding:8px 8px 4px;margin-bottom:8px"><div class="cat-label" style="color:'+co.t+'">'+cat+'</div><div class="book-grid">'+tiles+'</div></div>';
  });
  return cats;
}

async function toggleCh(bi,ch){
  const k=bi+'-'+ch;
  if(savingChapters[k])return;

  const bp=AD.myBibleProgress;
  const abp=AD.allBibleProgress;
  const wasChecked=bp.indexOf(k)>-1;

  if(wasChecked){
    const idxs=[];
    bp.forEach(function(v,i){if(v===k)idxs.push(i);});
    for(let i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
    if(abp[CU.id]){
      const ai=[];
      abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});
      for(let i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);
    }
  }else{
    bp.push(k);
    if(!abp[CU.id])abp[CU.id]=[];
    abp[CU.id].push(k);
  }

  savingChapters[k]=true;
  showToast('저장 중...');
  renderBible();

  try{
    await gas('toggleBibleChapter',CU.id,k);
    delete savingChapters[k];
    showToast('저장됨','success');
    renderBible();
  }catch(e){
    delete savingChapters[k];
    if(wasChecked){
      bp.push(k);
      if(!abp[CU.id])abp[CU.id]=[];
      abp[CU.id].push(k);
    }else{
      const idxs=[];
      bp.forEach(function(v,i){if(v===k)idxs.push(i);});
      for(let i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
      if(abp[CU.id]){
        const ai=[];
        abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});
        for(let i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);
      }
    }
    showToast('저장 실패, 다시 시도해주세요','error');
    renderBible();
  }
}

function showReadDetail(uid){
  const usr=gm(uid);
  const bp=uid===CU.id?(AD.myBibleProgress||[]):((AD.allBibleProgress||{})[uid]||[]);
  const rc=bp.length;
  const pct=Math.round(rc/TC*100);

  const bm={};
  bp.forEach(function(k){
    const p=String(k).split('-');
    const bi=parseInt(p[0]);
    if(isNaN(bi))return;
    if(!bm[bi])bm[bi]=[];
    bm[bi].push(parseInt(p[1])+1);
  });

  let bl='';
  if(!Object.keys(bm).length){
    bl='<div style="text-align:center;padding:16px;color:var(--b5);font-size:14px">아직 읽은 장이 없어요</div>';
  }else{
    Object.entries(bm).sort(function(a,b){return a[0]-b[0];}).forEach(function(entry){
      const bi=entry[0],chs=entry[1];
      const bk=BIBLE[bi];
      if(!bk)return;
      const co=CC[bk.cat];
      chs.sort(function(a,b){return a-b;});

      const rng=[];
      let s=chs[0],e=s;
      for(let i=1;i<chs.length;i++){
        if(chs[i]===e+1)e=chs[i];
        else{rng.push(s===e?s+'장':s+'~'+e+'장');s=chs[i];e=s;}
      }
      rng.push(s===e?s+'장':s+'~'+e+'장');

      bl+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)">'
        +'<span style="font-size:14px;font-weight:600;min-width:65px;color:'+co.t+'">'+bk.n+'</span>'
        +'<div class="progress-bar-bg" style="flex:1;height:6px"><div class="progress-bar-fill" style="width:'+Math.round(chs.length/bk.c*100)+'%;background:'+co.a+'"></div></div>'
        +'<span style="font-size:12px;color:var(--b5)">'+chs.length+'/'+bk.c+'</span></div>'
        +'<div style="font-size:11px;color:var(--b3);padding:2px 0 4px 73px">'+rng.join(', ')+'</div>';
    });
  }

  showPopup('<button class="popup-close" onclick="closePopup()">✕</button>'
    +'<div style="text-align:center;margin-bottom:14px">'
    +'<div style="font-size:36px">'+usr.emoji+'</div>'
    +'<div style="font-size:20px;font-weight:800">'+escapeHtml(usr.name)+'님의 읽기 현황</div>'
    +'<div style="font-size:14px;color:var(--b5)">'+rc+'장 ('+pct+'%)</div>'
    +'<div class="progress-bar-bg" style="margin:8px auto;max-width:200px"><div class="progress-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--b7))"></div></div>'
    +'</div>'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:8px">📚 읽은 성경</div>'+bl);
}

function renderChallenges(){
  if(!AD)return'';
  const chs=AD.challenges,certs=AD.challengeCerts;

  const fTabs='<div class="filter-tabs">'
    +'<button class="filter-tab'+(chFilter==='active'?' active':'')+'" onclick="chFilter=\'active\';renderBible()">진행 중</button>'
    +'<button class="filter-tab'+(chFilter==='completed'?' active':'')+'" onclick="chFilter=\'completed\';renderBible()">완료됨</button>'
    +'</div>';

  const filtered=chs.filter(function(c){return c.status===(chFilter==='completed'?'completed':'active');});

  if(viewChId)return renderChDetail(viewChId);

  let list=filtered.map(function(ch){
    const days=Math.max(Math.ceil((new Date(ch.endDate)-new Date(ch.startDate))/864e5)+1,1);
    const isMem=ch.memberIds.includes(CU.id);
    const ac=certs.filter(function(c){return c.challengeId===ch.id;});
    const op=ch.memberIds.length*days>0?Math.round(ac.length/(ch.memberIds.length*days)*100):0;

    let top='';
    if(ch.memberIds.length){
      const cnt={};
      ch.memberIds.forEach(function(u){cnt[u]=ac.filter(function(c){return c.userId===u;}).length;});
      const t=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];})[0];
      if(t&&t[1]>0)top='🏆 '+gm(t[0]).emoji+escapeHtml(gm(t[0]).name)+' '+t[1]+'일';
    }

    const mc=ac.filter(function(c){return c.userId===CU.id;}).length;
    const mp=Math.round(mc/days*100);

    return '<div class="ch-card" onclick="viewChId=\''+ch.id+'\';renderBible()">'
      +'<div style="display:flex;justify-content:space-between">'
      +'<div><div style="font-size:15px;font-weight:700">'+escapeHtml(ch.title)+(ch.status==='completed'?' ✅':'')+'</div>'
      +'<div class="ch-meta">📖 '+escapeHtml(ch.book)+' · '+ch.startDate.slice(5)+'~'+ch.endDate.slice(5)+' · 전체 '+op+'%</div>'
      +(top?'<div style="font-size:12px;color:var(--gold)">'+top+'</div>':'')
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'
      +(!isMem&&ch.status==='active'?'<button class="btn-sm" onclick="event.stopPropagation();joinCh(\''+ch.id+'\')" style="background:var(--gold);color:#fff">참여</button>':isMem?'<span style="font-size:11px;color:var(--green);font-weight:600">참여중</span>':'')
      +'</div></div>'
      +'<div class="ch-members">'+ch.memberIds.map(function(u){return '<div class="ch-member-av">'+gm(u).emoji+'</div>';}).join('')
      +'<span style="font-size:11px;color:var(--b5);margin-left:4px">'+ch.memberIds.length+'명</span></div>'
      +(isMem?'<div class="ch-progress"><span class="pname">'+CU.emoji+'나</span>'
        +'<div class="progress-bar-bg" style="flex:1"><div class="progress-bar-fill" style="width:'+mp+'%;background:var(--gold)"></div></div>'
        +'<span class="pct">'+mp+'%</span></div>':'')
      +'</div>';
  }).join('');

  if(!list){
    list='<div style="text-align:center;padding:20px;color:var(--b5)">'+(chFilter==='completed'?'완료된 챌린지가 없어요':'진행 중인 챌린지가 없어요')+'</div>';
  }

  const newForm=schf?'<div class="card">'
    +'<div class="fg"><label class="q-label">📌 이름</label><input class="input-field" id="chT"></div>'
    +'<div class="fg"><label class="q-label">📖 성경</label><select class="select-field" id="chB">'+BN.map(function(b){return '<option>'+b+'</option>';}).join('')+'</select></div>'
    +'<div class="fg" style="display:flex;gap:6px">'
    +'<div style="flex:1"><label class="q-label">시작</label><input type="date" class="input-field" id="chS"></div>'
    +'<div style="flex:1"><label class="q-label">종료</label><input type="date" class="input-field" id="chE"></div>'
    +'</div>'
    +'<button class="btn-primary" id="chCreateBtn" onclick="createCh()">만들기</button>'
    +'</div>':'';

  return '<button class="btn-dashed" onclick="schf=!schf;renderBible()">'+(schf?'닫기':'🏆 새 챌린지')+'</button>'+newForm+fTabs+list;
}

function renderChDetail(cid){
  const ch=AD.challenges.find(function(c){return c.id===cid;});
  if(!ch)return'<button class="back-btn" onclick="viewChId=null;renderBible()">← 목록</button>';

  const certs=AD.challengeCerts.filter(function(c){return c.challengeId===cid;});
  const days=Math.max(Math.ceil((new Date(ch.endDate)-new Date(ch.startDate))/864e5)+1,1);
  const isMem=ch.memberIds.includes(CU.id);
  const isCr=ch.creatorId===CU.id;
  const todayCerted=certs.some(function(c){return c.userId===CU.id&&c.date===td();});

  const memberStats=ch.memberIds.map(function(uid){
    const cnt=certs.filter(function(c){return c.userId===uid;}).length;
    return{uid:uid,cnt:cnt,pct:Math.round(cnt/days*100)};
  }).sort(function(a,b){return b.cnt-a.cnt;});

  const mp=memberStats.map(function(ms){
    return '<div class="ch-progress">'
      +'<span class="pname">'+gm(ms.uid).emoji+escapeHtml(gm(ms.uid).name)+'</span>'
      +'<div class="progress-bar-bg" style="flex:1"><div class="progress-bar-fill" style="width:'+ms.pct+'%;background:'+(ms.uid===CU.id?'var(--gold)':'var(--green)')+'"></div></div>'
      +'<span class="pct">'+ms.pct+'%</span></div>';
  }).join('');

  const myCerts=new Set(certs.filter(function(c){return c.userId===CU.id;}).map(function(c){return c.date;}));
  const st=new Date(ch.startDate);
  let dots='';
  for(let i=0;i<Math.min(days,42);i++){
    const d=new Date(st);d.setDate(d.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const done=myCerts.has(ds);
    const past=ds<=td();
    dots+='<div class="cert-dot" style="background:'+(done?'var(--gold)':past?'#E8D4D4':'var(--b1)')+';color:'+(done?'#fff':'var(--b5)')+'">'+d.getDate()+'</div>';
  }

  const op=ch.memberIds.length*days>0?Math.round(certs.length/(ch.memberIds.length*days)*100):0;

  return '<button class="back-btn" onclick="viewChId=null;renderBible()">← 목록</button>'
    +'<div class="card">'
    +'<div style="font-size:17px;font-weight:700;margin-bottom:2px">'+escapeHtml(ch.title)+(ch.status==='completed'?' ✅':'')+'</div>'
    +'<div class="ch-meta">📖 '+escapeHtml(ch.book)+' · '+ch.startDate+'~'+ch.endDate+' · '+ch.memberIds.length+'명 · 전체 '+op+'%</div>'
    +(isMem&&ch.status==='active'&&!todayCerted?'<button class="btn-full" onclick="certToday(\''+cid+'\')" style="background:var(--gold);color:#fff;margin:10px 0">✅ 오늘 읽었어요!</button>':'')
    +(isMem&&todayCerted?'<div style="text-align:center;padding:10px;background:#E8F5E8;border-radius:8px;margin:10px 0;font-size:14px;font-weight:600;color:var(--green)">✅ 오늘 인증 완료!</div>':'')
    +(!isMem&&ch.status==='active'?'<button class="btn-full" onclick="joinCh(\''+cid+'\')" style="background:var(--gold);color:#fff;margin:10px 0">🙋 참여하기</button>':'')
    +'</div>'
    +'<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:8px">참여자 현황</div>'+mp+'</div>'
    +(isMem?'<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:6px">인증 기록</div><div class="cert-log">'+dots+'</div><div style="font-size:10px;color:var(--b5);margin-top:4px">🟡인증 🔴미인증 ⬜예정</div></div>':'')
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">'
    +(isCr&&ch.status==='active'?'<button class="btn-sm" onclick="completeCh(\''+cid+'\')" style="background:var(--green);color:#fff">✅ 완료</button>':'')
    +(isCr?'<button class="btn-sm" onclick="deleteCh(\''+cid+'\')" style="background:#E8D4D4;color:#6E2E2E">🗑 삭제</button>':'')
    +'</div>';
}

async function certToday(cid){
  AD.challengeCerts.push({challengeId:cid,userId:CU.id,date:td()});
  renderBible();
  showToast('인증 중...');
  try{
    await gas('certChallenge',cid,CU.id,td());
    showToast('인증 완료 ✓','success');
  }catch(e){
    AD.challengeCerts=AD.challengeCerts.filter(function(c){return !(c.challengeId===cid&&c.userId===CU.id&&c.date===td());});
    renderBible();
    showToast('인증 실패','error');
  }
}

async function createCh(){
  const t=document.getElementById('chT').value.trim();
  const b=document.getElementById('chB').value;
  const s=document.getElementById('chS').value;
  const e=document.getElementById('chE').value;

  if(!t){showToast('이름을 입력해주세요','error');return;}
  if(!s||!e){showToast('시작/종료일을 선택해주세요','error');return;}

  const btn=document.getElementById('chCreateBtn');
  if(btn){btn.disabled=true;btn.textContent='생성 중...';}

  try{
    const res=await gas('createChallenge',t,b,BN.indexOf(b),s,e,CU.id);
    if(res&&res.id){
      AD.challenges.push({
        id:res.id,title:t,book:b,bookIdx:BN.indexOf(b),
        startDate:s,endDate:e,creatorId:CU.id,memberIds:[CU.id],status:'active'
      });
    }
    schf=false;
    showToast('챌린지 생성 완료 ✓','success');
    renderBible();
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='만들기';}
    showToast('생성 실패, 다시 시도해주세요','error');
  }
}

async function joinCh(id){
  const ch=AD.challenges.find(function(c){return c.id===id;});
  if(ch&&!ch.memberIds.includes(CU.id))ch.memberIds.push(CU.id);
  renderBible();
  showToast('참여 중...');
  try{
    await gas('joinChallenge',id,CU.id);
    showToast('참여 완료 ✓','success');
  }catch(e){
    if(ch)ch.memberIds=ch.memberIds.filter(function(m){return m!==CU.id;});
    renderBible();
    showToast('참여 실패','error');
  }
}

async function deleteCh(id){
  if(!confirm('삭제하시겠습니까?'))return;
  const backup=AD.challenges.find(function(c){return c.id===id;});
  const certBackup=AD.challengeCerts.filter(function(c){return c.challengeId===id;});
  AD.challenges=AD.challenges.filter(function(c){return c.id!==id;});
  AD.challengeCerts=AD.challengeCerts.filter(function(c){return c.challengeId!==id;});
  viewChId=null;
  renderBible();
  showToast('삭제 중...');
  try{
    await gas('deleteChallenge',id,CU.id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    if(backup)AD.challenges.push(backup);
    AD.challengeCerts=AD.challengeCerts.concat(certBackup);
    renderBible();
    showToast('삭제 실패','error');
  }
}

async function completeCh(id){
  if(!confirm('챌린지를 완료 처리하시겠습니까?'))return;
  const ch=AD.challenges.find(function(c){return c.id===id;});
  if(ch)ch.status='completed';
  renderBible();
  showToast('완료 처리 중...');
  try{
    await gas('completeChallenge',id,CU.id);
    showToast('완료 처리됨 ✓','success');
  }catch(e){
    if(ch)ch.status='active';
    renderBible();
    showToast('완료 처리 실패','error');
  }
}

function renderCalendar(){
  const el=document.getElementById('page-calendar');
  if(!AD){el.innerHTML=loadingView('calendar','일정을 불러오고 있어요');return;}

  const ms=cy+'-'+pd(cm+1);
  const fd_=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();
  const ts=td();

  const dh=['일','월','화','수','목','금','토'].map(function(d,i){
    return '<div style="color:'+(i===0?'var(--coral)':i===6?'var(--blue)':'var(--b5)')+'">'+d+'</div>';
  }).join('');

  let cells='';
  for(let i=0;i<fd_;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=ms+'-'+pd(d);
    const evts=(AD.calendarEvents||[]).filter(function(e){return e.date===ds;});
    const it=ds===ts;
    const dow=new Date(cy,cm,d).getDay();
    const dots=evts.slice(0,4).map(function(ev){
      const e=ET[ev.type]||ET.etc;
      const titleShort=ev.title.length>5?ev.title.slice(0,5)+'…':ev.title;
      return '<div class="cal-ev" style="background:'+e.c+'20;color:'+e.c+'">'+e.i+escapeHtml(titleShort)+'</div>';
    }).join('');
    cells+='<div class="cal-cell'+(it?' today':'')+'" onclick="showDayEvts(\''+ds+'\')">'
      +'<div class="cal-day" style="color:'+(dow===0?'var(--coral)':dow===6?'var(--blue)':'#4A3F35')+';font-weight:'+(it?700:400)+'">'+d+'</div>'
      +dots+'</div>';
  }

  const catTabs='<div style="display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap">'
    +'<button class="cat-tab" onclick="cef=\'all\';renderCalendar()" style="background:'+(cef==='all'?'var(--b7)':'var(--b1)')+';color:'+(cef==='all'?'#FAF0E6':'var(--b7)')+'">전체</button>'
    +Object.entries(ET).map(function(entry){
      const k=entry[0],v=entry[1];
      return '<button class="cat-tab" onclick="cef=\''+k+'\';renderCalendar()" style="background:'+(cef===k?v.c:'var(--b1)')+';color:'+(cef===k?'#fff':'var(--b7)')+'">'+v.i+v.l+'</button>';
    }).join('')+'</div>';

  const mEvts=(AD.calendarEvents||[]).filter(function(e){
    return e.date.startsWith(ms)&&(cef==='all'||e.type===cef);
  }).sort(function(a,b){return a.date.localeCompare(b.date);});

  const evtList=mEvts.map(function(ev){
    const e=ET[ev.type]||ET.etc;
    const dd=ev.date.split('-');
    return '<div class="evt-row" onclick="showEvtEdit(\''+ev.id+'\')">'
      +'<div class="evt-icon" style="background:'+e.c+'18">'+e.i+'</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+escapeHtml(ev.title)+'</div>'
      +'<div style="font-size:12px;color:var(--b5)">'+dd[1]+'/'+dd[2]+' · '+escapeHtml(ev.startTime||'')+(ev.endTime?' ~ '+escapeHtml(ev.endTime):'')+'</div></div></div>';
  }).join('');

  const tb=Object.entries(ET).map(function(entry){
    const k=entry[0],v=entry[1];
    return '<button class="cat-tab" onclick="selEt=\''+k+'\';saveEvF();renderCalendar()" style="background:'+(selEt===k?v.c:'var(--b1)')+';color:'+(selEt===k?'#fff':'var(--b7)')+'">'+v.i+v.l+'</button>';
  }).join('');

  const fh=sef?'<div class="card">'
    +'<div class="fg"><label class="q-label">📌 제목</label><input class="input-field" id="evT" value="'+escapeHtml(evFD.t||'')+'"></div>'
    +'<div class="fg"><label class="q-label">📅 날짜</label><input type="date" class="input-field" id="evD" value="'+(evFD.d||'')+'"></div>'
    +'<div class="fg" style="display:flex;gap:10px;flex-wrap:wrap">'
    +'<div style="flex:1;min-width:260px"><label class="q-label">⏰ 시작</label>'+renderTimePicker('evS',evFD.s||'')+'</div>'
    +'<div style="flex:1;min-width:260px"><label class="q-label">⏰ 종료</label>'+renderTimePicker('evE',evFD.e||'')+'</div>'
    +'</div>'
    +'<div class="fg"><label class="q-label">📂 카테고리</label><div style="display:flex;flex-wrap:wrap;gap:4px">'+tb+'</div></div>'
    +(selEt==='etc'?'<div class="fg"><input class="input-field" id="evCT" placeholder="직접 입력" value="'+escapeHtml(evFD.ct||'')+'"></div>':'')
    +'<div class="fg"><label class="q-label">📝 상세</label><textarea class="input-field" id="evDt" rows="2" style="resize:none">'+escapeHtml(evFD.dt||'')+'</textarea></div>'
    +'<button class="btn-primary" id="evAddBtn" onclick="addEvt()">추가</button>'
    +'</div>':'';

  el.innerHTML='<div style="padding:4px 2px 18px">'
    +'<div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:var(--b9);line-height:1.2">캘린더</div>'
    +'<div style="font-size:13px;color:var(--b5);margin-top:4px">공동체의 일정을 함께 공유해요</div></div>'
    +'<div class="card" style="margin-bottom:10px"><div class="cal-nav">'
    +'<button onclick="calPrev()">◀</button>'
    +'<h2>'+cy+'년 '+(cm+1)+'월</h2>'
    +'<button onclick="calNext()">▶</button></div></div>'
    +'<div class="card" style="margin-bottom:10px"><div class="cal-hdr">'+dh+'</div><div class="cal-grid">'+cells+'</div></div>'
    +'<button class="btn-dashed" onclick="sef=!sef;renderCalendar()">'+(sef?'닫기':'📅 일정 추가')+'</button>'+fh
    +'<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:8px">이번 달 일정</div>'+catTabs+(evtList||'<div style="font-size:13px;color:var(--b5)">없음</div>')+'</div>';
}

function calPrev(){
  if(cm===0){cm=11;cy--;}else{cm--;}
  renderCalendar();
}
function calNext(){
  if(cm===11){cm=0;cy++;}else{cm++;}
  renderCalendar();
}

function saveEvF(){
  const t=document.getElementById('evT');
  const d=document.getElementById('evD');
  const ct=document.getElementById('evCT');
  const dt=document.getElementById('evDt');
  const s=document.getElementById('tp-evS')?tpGetValue('evS'):'';
  const e=document.getElementById('tp-evE')?tpGetValue('evE'):'';
  evFD={t:t?t.value:'',d:d?d.value:'',s:s,e:e,ct:ct?ct.value:'',dt:dt?dt.value:''};
}

async function addEvt(){
  const t=document.getElementById('evT').value.trim();
  const d=document.getElementById('evD').value;
  const s=tpGetValue('evS');
  const e=tpGetValue('evE');
  const dt=(document.getElementById('evDt')||{}).value||'';

  if(!t){showToast('제목을 입력해주세요','error');return;}
  if(!d){showToast('날짜를 선택해주세요','error');return;}

  let ct='';
  if(selEt==='etc'){
    const c=document.getElementById('evCT');
    if(c)ct=c.value.trim();
  }

  const btn=document.getElementById('evAddBtn');
  if(btn){btn.disabled=true;btn.textContent='등록 중...';}

  const tempId='temp_'+Date.now();
  const tempEv={id:tempId,title:t,date:d,startTime:s,endTime:e,type:selEt,detail:dt,customType:ct,_pending:true};
  AD.calendarEvents.push(tempEv);
  sef=false;
  evFD={t:'',d:'',s:'',e:'',ct:'',dt:''};
  renderCalendar();
  showToast('저장 중...');

  try{
    const r=await gas('addCalendarEvent',t,d,s,e,selEt,dt,ct,false);
    const idx=AD.calendarEvents.findIndex(function(x){return x.id===tempId;});
    if(idx>=0&&r&&r.id){
      AD.calendarEvents[idx].id=r.id;
      delete AD.calendarEvents[idx]._pending;
    }
    showToast('일정 등록 완료 ✓','success');
    renderCalendar();
  }catch(err){
    AD.calendarEvents=AD.calendarEvents.filter(function(x){return x.id!==tempId;});
    sef=true;
    showToast('등록 실패','error');
    renderCalendar();
  }
}

// 시간 선택 위젯
function _tpParse(hhmm){
  if(!hhmm||!/^\d{1,2}:\d{1,2}$/.test(hhmm))return{ampm:'am',h12:9,m:0};
  const parts=hhmm.split(':');
  let h=parseInt(parts[0])||0;
  const m=parseInt(parts[1])||0;
  const ampm=h>=12?'pm':'am';
  let h12=h%12;
  if(h12===0)h12=12;
  return{ampm:ampm,h12:h12,m:m};
}

function _tpFormat(ampm,h12,m){
  let h24=h12;
  if(ampm==='am'&&h12===12)h24=0;
  else if(ampm==='pm'&&h12!==12)h24=h12+12;
  return pd(h24)+':'+pd(m);
}

function renderTimePicker(id,value){
  const p=_tpParse(value);
  return '<div class="tp-wrap" id="tp-'+id+'" data-ampm="'+p.ampm+'">'
    +'<div class="tp-row">'
    +'<div class="tp-ampm">'
    +'<button type="button" class="'+(p.ampm==='am'?'active':'')+'" onclick="tpSetAmpm(\''+id+'\',\'am\')">오전</button>'
    +'<button type="button" class="'+(p.ampm==='pm'?'active':'')+'" onclick="tpSetAmpm(\''+id+'\',\'pm\')">오후</button>'
    +'</div>'
    +'<div class="tp-num">'
    +'<input type="number" min="1" max="12" id="tph-'+id+'" value="'+p.h12+'" oninput="tpNormalizeH(\''+id+'\')">'
    +'<div class="tp-arrows">'
    +'<button type="button" onclick="tpIncHour(\''+id+'\')">▲</button>'
    +'<button type="button" onclick="tpDecHour(\''+id+'\')">▼</button>'
    +'</div>'
    +'</div>'
    +'<div class="tp-label">시</div>'
    +'<div class="tp-num">'
    +'<input type="number" min="0" max="59" id="tpm-'+id+'" value="'+pd(p.m)+'" oninput="tpNormalizeM(\''+id+'\')">'
    +'<div class="tp-arrows">'
    +'<button type="button" onclick="tpIncMin(\''+id+'\')">▲</button>'
    +'<button type="button" onclick="tpDecMin(\''+id+'\')">▼</button>'
    +'</div>'
    +'</div>'
    +'<div class="tp-label">분</div>'
    +'</div>'
    +'<div class="tp-quick">'
    +'<button type="button" class="tp-now" onclick="tpSetNow(\''+id+'\')">🕐 지금</button>'
    +'<button type="button" onclick="tpSetQuick(\''+id+'\',\'09:00\')">9시</button>'
    +'<button type="button" onclick="tpSetQuick(\''+id+'\',\'11:00\')">11시</button>'
    +'<button type="button" onclick="tpSetQuick(\''+id+'\',\'14:00\')">14시</button>'
    +'<button type="button" onclick="tpSetQuick(\''+id+'\',\'19:30\')">19:30</button>'
    +'</div>'
    +'</div>';
}

function tpGetValue(id){
  const wrap=document.getElementById('tp-'+id);
  if(!wrap)return'';
  const ampm=wrap.getAttribute('data-ampm')||'am';
  const h12=parseInt(document.getElementById('tph-'+id).value)||12;
  const m=parseInt(document.getElementById('tpm-'+id).value)||0;
  return _tpFormat(ampm,Math.min(12,Math.max(1,h12)),Math.min(59,Math.max(0,m)));
}

function tpSetAmpm(id,ampm){
  const wrap=document.getElementById('tp-'+id);
  if(!wrap)return;
  wrap.setAttribute('data-ampm',ampm);
  wrap.querySelectorAll('.tp-ampm button').forEach(function(b){b.classList.remove('active');});
  wrap.querySelector('.tp-ampm button[onclick*="\''+ampm+'\'"]').classList.add('active');
}

function tpIncHour(id){
  const el=document.getElementById('tph-'+id);
  let h=parseInt(el.value)||1;
  h=h>=12?1:h+1;
  el.value=h;
}
function tpDecHour(id){
  const el=document.getElementById('tph-'+id);
  let h=parseInt(el.value)||1;
  h=h<=1?12:h-1;
  el.value=h;
}

function tpIncMin(id){
  const el=document.getElementById('tpm-'+id);
  let m=parseInt(el.value)||0;
  m=Math.floor(m/5)*5+5;
  if(m>=60)m=0;
  el.value=pd(m);
}
function tpDecMin(id){
  const el=document.getElementById('tpm-'+id);
  let m=parseInt(el.value)||0;
  m=m<=0?55:(Math.ceil(m/5)*5-5);
  if(m<0)m=55;
  el.value=pd(m);
}

function tpNormalizeH(id){
  const el=document.getElementById('tph-'+id);
  let h=parseInt(el.value);
  if(isNaN(h))return;
  if(h<1)el.value=1;
  else if(h>12)el.value=12;
}
function tpNormalizeM(id){
  const el=document.getElementById('tpm-'+id);
  let m=parseInt(el.value);
  if(isNaN(m))return;
  if(m<0)el.value=0;
  else if(m>59)el.value=59;
}

function tpSetQuick(id,hhmm){
  const p=_tpParse(hhmm);
  const wrap=document.getElementById('tp-'+id);
  if(!wrap)return;
  wrap.setAttribute('data-ampm',p.ampm);
  wrap.querySelectorAll('.tp-ampm button').forEach(function(b){b.classList.remove('active');});
  wrap.querySelector('.tp-ampm button[onclick*="\''+p.ampm+'\'"]').classList.add('active');
  document.getElementById('tph-'+id).value=p.h12;
  document.getElementById('tpm-'+id).value=pd(p.m);
}

function tpSetNow(id){
  const n=new Date();
  const hh=pd(n.getHours());
  const mm=pd(n.getMinutes());
  tpSetQuick(id,hh+':'+mm);
}

// 미니 캘린더
function renderMiniCal(type,posts){
  const ms=cy+'-'+pd(cm+1);
  const fd_=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();

  const dateCounts={};
  posts.forEach(function(p){
    const d=p.date;
    if(d.startsWith(ms))dateCounts[d]=(dateCounts[d]||0)+1;
  });

  const dh=['일','월','화','수','목','금','토'].map(function(d){return '<div>'+d+'</div>';}).join('');

  let cells='';
  for(let i=0;i<fd_;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=ms+'-'+pd(d);
    const cnt=dateCounts[ds]||0;
    const today=ds===td();
    cells+='<div class="mc-cell'+(cnt?' has':'')+(today?' sel':'')+'" onclick="showDatePosts(\''+type+'\',\''+ds+'\')">'+d+(cnt?'<div style="font-size:8px">'+cnt+'</div>':'')+'</div>';
  }

  return '<div class="card"><div class="cal-nav">'
    +'<button onclick="miniCalPrev(\''+type+'\')">◀</button>'
    +'<h2>'+cy+'년 '+(cm+1)+'월</h2>'
    +'<button onclick="miniCalNext(\''+type+'\')">▶</button>'
    +'</div></div>'
    +'<div class="card mini-cal"><div class="mc-hdr">'+dh+'</div><div class="mc-grid">'+cells+'</div></div>';
}

function miniCalPrev(type){
  if(cm===0){cm=11;cy--;}else{cm--;}
  if(type==='qt')renderQt();else renderPrayer();
}
function miniCalNext(type){
  if(cm===11){cm=0;cy++;}else{cm++;}
  if(type==='qt')renderQt();else renderPrayer();
}

  const statCards='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'

    +'<div style="font-size:11px;color:var(--b5);margin-top:2px">'+rcnt+'/'+TC+'장</div>'
    +'<div class="progress-bar-bg" style="margin-top:8px;height:6px"><div class="progress-bar-fill" style="width:'+rpct+'%;background:linear-gradient(90deg,var(--gold),var(--b7))"></div></div>'
    +'</div>'
    +'<div class="card" style="margin:0;padding:16px;cursor:pointer" onclick="bsub=\'challenge\';switchTab(\'bible\')">'
    +'<div style="font-size:11px;color:var(--b5);font-weight:700;letter-spacing:.3px;margin-bottom:4px">🏆 챌린지</div>'
    +'<div style="font-size:22px;font-weight:900;color:var(--gold);letter-spacing:-.5px">'+myChs.length+'<span style="font-size:14px;color:var(--b5);font-weight:700">개</span></div>'

    +'</div>'
    +'</div>';

  // 이번 주 일정
  const now=new Date();
  const weekEnd=new Date(now);
  weekEnd.setDate(weekEnd.getDate()+7);
  const weekEvts=(AD.calendarEvents||[]).filter(function(ev){
    const d=new Date(ev.date);
    return d>=new Date(td())&&d<=weekEnd;
  }).sort(function(a,b){
    if(a.date!==b.date)return a.date.localeCompare(b.date);
    return(a.startTime||'').localeCompare(b.startTime||'');
  }).slice(0,3);

  let weekCard='';
  if(weekEvts.length){
    const items=weekEvts.map(function(ev){
      const e=ET[ev.type]||ET.etc;
      const dd=ev.date.split('-');
      return '<div class="evt-row" onclick="showEvtEdit(\''+ev.id+'\')">'

        +'<div style="font-size:12px;color:var(--b5)">'+dd[1]+'/'+dd[2]+(ev.startTime?' · '+escapeHtml(ev.startTime):'')+'</div></div></div>';

  // 최근 예배
  const sortedW=(worshipsData.list||[]).slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});

  if(sortedW.length){
    const w=sortedW[0];
    const ws=(worshipsData.songs||[]).filter(function(s){return s.worshipId===w.id;});
    const wsh=(worshipsData.shares||[]).filter(function(s){return s.worshipId===w.id;});

      +'<div style="font-size:18px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px">'+escapeHtml(w.title||'예배')+'</div>'

      +'</div>';
  }

  // 최근 나눔 (QT + 기도)
  const recentQt=qtPosts.slice(0,2);

  const recent=recentQt.concat(recentPr).sort(function(a,b){return(b.date||'').localeCompare(a.date||'');}).slice(0,3);

  let nanumCard='';
  if(recent.length){

      const m=gm(p.authorId);

      const preview=isQt?(p.bestVerse||p.shareContent||p.applyContent||'').slice(0,60):p.situation.slice(0,60);

        +'<div class="avatar" style="width:34px;height:34px;font-size:14px">'+m.emoji+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">'
        +'<span style="font-size:13px;font-weight:700">'+escapeHtml(m.name)+'</span>'
        +'<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:'+(isQt?'var(--gold)':'var(--purple)')+';color:#fff;font-weight:700">'+(isQt?'QT':'기도')+'</span>'
        +'<span style="font-size:11px;color:var(--b5);margin-left:auto">'+escapeHtml(p.date||'')+'</span>'
        +'</div>'
        +'<div style="font-size:13px;color:#4A3F35;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+escapeHtml(preview)+'</div>'
        +'</div>'
        +'</div>';
    }).join('');
    nanumCard='<div class="card" style="margin-bottom:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<div style="font-size:15px;font-weight:800">💛 최근 나눔</div>'
      +'<button class="btn-pill" style="background:var(--b1);color:var(--b7);font-size:11px" onclick="switchTab(\'nanum\')">전체 →</button>'
      +'</div>'+items+'</div>';
  }

  el.innerHTML='<div style="padding:6px 4px 16px"><div style="font-size:14px;color:var(--b5);font-weight:600">'+escapeHtml(greet)+',</div>'
    +'<div style="font-size:24px;font-weight:900;letter-spacing:-.6px;margin-top:2px">'+escapeHtml(CU.name)+'님</div></div>'
    +verseCard
    +statCards
    +weekCard
    +worshipCard
    +nanumCard;
}

function editProfile(){

  EMOJIS.forEach(function(e,i){

    emojiHtml+='<button class="emoji-opt'+(sel?' sel':'')+'" data-emoji="'+e+'" onclick="document.querySelectorAll(\'#editEmojiGrid .emoji-opt\').forEach(function(b){b.classList.remove(\'sel\')});this.classList.add(\'sel\')">'+e+'</button>';

    +'<button class="btn-primary" onclick="saveProfile()">저장</button>');

async function saveProfile(){
  const sel=document.querySelector('#editEmojiGrid .emoji-opt.sel');
  const newEmoji=sel?sel.getAttribute('data-emoji'):CU.emoji;
  const newBio=document.getElementById('editBio').value.trim();
  const oldEmoji=CU.emoji;
  const oldBio=CU.bio;

  CU.emoji=newEmoji;
  CU.bio=newBio;
  document.getElementById('profileBtn').textContent=newEmoji;

  closePopup();
  renderMyPage();
  showToast('저장 중...');

  try{
    await gas('updateProfile',CU.id,newEmoji,newBio);
    if(AD&&AD.users){
      const u=AD.users.find(function(x){return x.id===CU.id;});
      if(u){u.emoji=newEmoji;u.bio=newBio;}
    }
    showToast('프로필 저장 완료 ✓','success');
  }catch(e){
    CU.emoji=oldEmoji;
    CU.bio=oldBio;
    document.getElementById('profileBtn').textContent=oldEmoji;
    showToast('저장 실패','error');
    renderMyPage();
  }
}

async function submitNewWorship(){
  const date=document.getElementById('newWDate').value;
  const title=document.getElementById('newWTitle').value.trim();
  const verse=document.getElementById('newWVerse').value.trim();
  const zoom=_newWType==='online'?document.getElementById('newWZoom').value.trim():'';
  const type=_newWType==='online'?'online':'onsite';
  if(!date){showToast('날짜를 선택해주세요','error');return;}
  if(!title){showToast('제목을 입력해주세요','error');return;}

  closePopup();
  showToast('등록 중...');
  try{
    const r=await gas('createWorship',date,title,verse,type,zoom,CU.id);
    if(r&&r.id){
      worshipsData.list.unshift({id:r.id,date:date,title:title,bibleRef:verse,type:type,zoomUrl:zoom,creatorId:CU.id});
      showToast('예배가 등록되었어요 ✓','success');
      renderWorship();
    }
  }catch(e){
    showToast('등록 실패','error');
  }
}

async function deleteWorship(){
  if(!confirm('이 예배를 삭제할까요? 찬양과 나눔도 함께 삭제됩니다.'))return;
  const id=selWorshipId;
  const wIdx=worshipsData.list.findIndex(function(x){return x.id===id;});
  if(wIdx<0)return;
  const backupW=worshipsData.list[wIdx];
  const backupS=worshipsData.songs.filter(function(x){return x.worshipId===id;});
  const backupSh=worshipsData.shares.filter(function(x){return x.worshipId===id;});
  worshipsData.list.splice(wIdx,1);
  worshipsData.songs=worshipsData.songs.filter(function(x){return x.worshipId!==id;});
  worshipsData.shares=worshipsData.shares.filter(function(x){return x.worshipId!==id;});
  selWorshipId=null;
  closePopup();
  renderWorship();
  showToast('삭제 중...');
  try{
    await gas('deleteWorship',id,CU.id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    worshipsData.list.push(backupW);
    worshipsData.songs=worshipsData.songs.concat(backupS);
    worshipsData.shares=worshipsData.shares.concat(backupSh);
    showToast('삭제 실패','error');
    renderWorship();
  }
}

function updateNoticeDot(){
  const dot=document.getElementById('noticeDot');
  if(!dot||!AD)return;
  const notices=AD.notices||[];
  // 가장 최근 공지의 ID와 로컬 저장된 마지막 확인 ID 비교
  if(!notices.length){dot.style.display='none';return;}
  const sorted=notices.slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
  const latest=sorted[0];
  const lastSeen=localStorage.getItem('yeorin_lastNotice');
  if(latest&&latest.id!==lastSeen)dot.style.display='block';
  else dot.style.display='none';
}

function startYeorinLoading(elId,messages){
  const el=document.getElementById(elId);

// 📦 Phase B: 여린 주소록 (Contacts)
// ============================================================
// 기능:
// - 가나다 그룹핑 + 검색 + 직분 필터
// - 추가/수정/삭제 (누구나)
// - 전화/이메일/지도 액션
// - vCard 다운로드 (스마트폰 연락처 저장)

const ROLE_LIST=['담임','부담임','전도사','집사','권사','장로','성도','새가족','어린이','청년'];

// ===== 한글 초성 추출 =====
function getInitial(name){
  if(!name)return'#';
  const ch=String(name).charAt(0);
  const code=ch.charCodeAt(0);
  // 한글 음절 영역: 0xAC00 ~ 0xD7A3
  if(code>=0xAC00&&code<=0xD7A3){
    const initials=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
    const idx=Math.floor((code-0xAC00)/588);
    let i=initials[idx];
    // 쌍자음을 단자음으로 통합
    if(i==='ㄲ')i='ㄱ';
    if(i==='ㄸ')i='ㄷ';
    if(i==='ㅃ')i='ㅂ';
    if(i==='ㅆ')i='ㅅ';
    if(i==='ㅉ')i='ㅈ';
    return i;
  }
  // 한글 자음 자체
  if(code>=0x3131&&code<=0x314E)return ch;
  // 영문
  if(/[a-zA-Z]/.test(ch))return ch.toUpperCase();
  return'#';
}

// ===== 가나다 정렬용 키 =====
function sortKey(name){
  return String(name||'').normalize('NFC');
}

// ===== 한글 초성 + 일반 검색 =====
function matchesSearch(contact,query){
  if(!query)return true;
  const q=String(query).toLowerCase().trim();
  if(!q)return true;
  const name=String(contact.name||'').toLowerCase();
  const phone=String(contact.phone||'').replace(/[-\s]/g,'');
  const phoneQ=q.replace(/[-\s]/g,'');
  if(name.includes(q))return true;
  if(phoneQ&&phone.includes(phoneQ))return true;
  // 초성 검색 (간단)
  if(/^[ㄱ-ㅎ]+$/.test(q)){
    let initials='';
    for(let i=0;i<contact.name.length;i++){
      initials+=getInitial(contact.name.charAt(i));
    }
    if(initials.includes(q))return true;
  }
  return false;
}

// ===== 메인 렌더 =====
function renderAddressBook(){
  const el=document.getElementById('page-addressbook');
  if(!AD){el.innerHTML=loadingView('mypage','주소록을 불러오고 있어요');return;}

  // 상세 페이지 모드
  if(selContactId){
    renderContactDetail();
    return;
  }

  const contacts=AD.contacts||[];

  // 필터링
  let filtered=contacts.filter(function(c){
    if(abRoleFilter!=='all'&&c.role!==abRoleFilter)return false;
    if(!matchesSearch(c,abSearch))return false;
    return true;
  });

  // 가나다 정렬
  filtered.sort(function(a,b){return sortKey(a.name).localeCompare(sortKey(b.name),'ko');});

  // 헤더
  let html='<button class="back-btn" onclick="switchTab(\'main\')">← 메인으로</button>'
    +'<div class="ab-header">'
    +'<div class="ab-title">📇 여린 주소록</div>'
    +'<div class="ab-count">총 '+contacts.length+'명'+(filtered.length!==contacts.length?' · 검색 결과 '+filtered.length+'명':'')+'</div>'
    +'</div>';

  // 검색바
  html+='<div class="ab-search-wrap">'
    +'<span class="ab-search-icon">🔍</span>'
    +'<input class="ab-search" id="abSearchInput" placeholder="이름·전화·초성 검색 (예: ㅎㅁㅎ)" value="'+escapeHtml(abSearch)+'" oninput="onAbSearchInput(this.value)">'
    +'<button class="ab-search-clear'+(abSearch?' show':'')+'" onclick="clearAbSearch()">✕</button>'
    +'</div>';

  // 직분 필터
  html+='<div class="ab-role-tabs">'
    +'<button class="ab-role-tab'+(abRoleFilter==='all'?' active':'')+'" onclick="setAbRoleFilter(\'all\')">전체</button>';
  // 실제 데이터에 있는 직분만 표시 (불필요한 빈 탭 방지)
  const usedRoles=ROLE_LIST.filter(function(r){
    return contacts.some(function(c){return c.role===r;});
  });
  // 데이터에 있지만 ROLE_LIST에 없는 커스텀 직분도 추가
  contacts.forEach(function(c){
    if(c.role&&ROLE_LIST.indexOf(c.role)===-1&&usedRoles.indexOf(c.role)===-1){
      usedRoles.push(c.role);
    }
  });
  usedRoles.forEach(function(r){
    html+='<button class="ab-role-tab'+(abRoleFilter===r?' active':'')+'" onclick="setAbRoleFilter(\''+escapeHtml(r)+'\')">'+escapeHtml(r)+'</button>';
  });
  html+='</div>';

  // 가나다 그룹핑 후 렌더
  if(filtered.length===0){
    if(contacts.length===0){
      html+='<div class="ab-empty">📭<br><br>아직 등록된 연락처가 없어요<br><br>오른쪽 아래 + 버튼으로 추가해보세요</div>';
    }else{
      html+='<div class="ab-empty">검색 결과가 없어요</div>';
    }
  }else{
    const grouped={};
    filtered.forEach(function(c){
      const k=getInitial(c.name);
      if(!grouped[k])grouped[k]=[];
      grouped[k].push(c);
    });
    // 그룹 정렬 (한글 → 영문 → #)
    const groupKeys=Object.keys(grouped).sort(function(a,b){
      const aIsHan=/[ㄱ-ㅎ]/.test(a);
      const bIsHan=/[ㄱ-ㅎ]/.test(b);
      if(aIsHan&&!bIsHan)return-1;
      if(!aIsHan&&bIsHan)return 1;
      if(a==='#')return 1;
      if(b==='#')return-1;
      return a.localeCompare(b,'ko');
    });

    groupKeys.forEach(function(k){
      html+='<div class="ab-section"><div class="ab-section-hdr">'+k+'</div>';
      grouped[k].forEach(function(c){
        const initial=String(c.name||'?').charAt(0);
        html+='<div class="ab-card" onclick="openContact(\''+c.id+'\')">'
          +'<div class="ab-card-avatar">'+escapeHtml(initial)+'</div>'
          +'<div class="ab-card-body">'
          +'<div class="ab-card-name">'+escapeHtml(c.name||'')
          +(c.role?'<span class="ab-card-role">'+escapeHtml(c.role)+'</span>':'')
          +'</div>'
          +(c.phone?'<div class="ab-card-phone">'+escapeHtml(formatPhone(c.phone))+'</div>':'')
          +'</div>'
          +'<div class="ab-card-arrow">›</div>'
          +'</div>';
      });
      html+='</div>';
    });
  }

  // 플로팅 추가 버튼
  html+='<button class="ab-fab" onclick="showContactForm()" title="연락처 추가">+</button>';

  el.innerHTML=html;
}

let _abSearchTimer=null;

  const cl=document.querySelector('.ab-search-clear');
  if(cl)cl.classList.toggle('show',!!v);

  if(_abSearchTimer)clearTimeout(_abSearchTimer);
  _abSearchTimer=setTimeout(function(){
    // 입력 포커스 유지를 위해 input 외 부분만 다시 그리기 위해 전체 렌더 후 포커스 복원
    const focused=document.activeElement===document.getElementById('abSearchInput');

    renderAddressBook();
    if(focused){
      const inp=document.getElementById('abSearchInput');
      if(inp){inp.focus();inp.setSelectionRange(cursor,cursor);}
    }

  renderAddressBook();
}

  abRoleFilter=role;

// ===== 전화번호 포맷 =====
function formatPhone(phone){
  if(!phone)return'';
  const d=String(phone).replace(/[^\d]/g,'');
  if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
  if(d.length===10){
    if(d.startsWith('02'))return d.slice(0,2)+'-'+d.slice(2,6)+'-'+d.slice(6);
    return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  }
  if(d.length===9)return d.slice(0,2)+'-'+d.slice(2,5)+'-'+d.slice(5);
  return phone;
}

async function submitContactForm(){
  const id=document.getElementById('cfId').value;
  const name=document.getElementById('cfName').value.trim();
  const phone=document.getElementById('cfPhone').value.trim();
  const birthday=document.getElementById('cfBirthday').value;
  const birthdayType=document.getElementById('cfBirthdayType').value||'solar';
  let role=document.getElementById('cfRole').value;
  if(role==='__custom__'){
    const custom=document.getElementById('cfRoleCustom').value.trim();
    role=custom;
  }
  const family=document.getElementById('cfFamily').value.trim();
  const address=document.getElementById('cfAddress').value.trim();
  const email=document.getElementById('cfEmail').value.trim();
  const memo=document.getElementById('cfMemo').value.trim();

  if(!name){showToast('이름을 입력해주세요','error');return;}

  const btn=document.getElementById('cfSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent=id?'저장 중...':'추가 중...';}

  if(id){
    // 수정
    const target=(AD.contacts||[]).find(function(x){return x.id===id;});
    if(!target){closePopup();return;}
    const backup=Object.assign({},target);
    Object.assign(target,{name:name,phone:phone,birthday:birthday,birthdayType:birthdayType,role:role,family:family,address:address,email:email,memo:memo});
    closePopup();
    selContactId?renderContactDetail():renderAddressBook();
    showToast('저장 중...');
    try{
      await gas('updateContact',id,name,phone,birthday,birthdayType,role,family,address,email,memo);
      showToast('저장 완료 ✓','success');
    }catch(e){
      Object.assign(target,backup);
      showToast('저장 실패','error');
      selContactId?renderContactDetail():renderAddressBook();
    }
  }else{
    // 추가
    const tempId='temp_'+Date.now();
    const tempContact={id:tempId,name:name,phone:phone,birthday:birthday,birthdayType:birthdayType,role:role,family:family,address:address,email:email,memo:memo,createdBy:CU.id,_pending:true};
    if(!AD.contacts)AD.contacts=[];
    AD.contacts.push(tempContact);
    closePopup();
    renderAddressBook();
    showToast('추가 중...');
    try{
      const r=await gas('addContact',CU.id,name,phone,birthday,birthdayType,role,family,address,email,memo);
      const idx=AD.contacts.findIndex(function(x){return x.id===tempId;});
      if(idx>=0&&r&&r.id){
        AD.contacts[idx].id=r.id;
        delete AD.contacts[idx]._pending;
      }
      showToast('연락처 추가 완료 ✓','success');
      renderAddressBook();
    }catch(e){
      AD.contacts=AD.contacts.filter(function(x){return x.id!==tempId;});
      showToast('추가 실패','error');
      renderAddressBook();
    }
  }
}

function confirmDeleteContact(id){
  const c=(AD.contacts||[]).find(function(x){return x.id===id;});
  if(!c)return;
  if(!confirm('"'+c.name+'" 연락처를 삭제할까요?\n이 동작은 되돌릴 수 없어요.'))return;

async function doDeleteContact(id){
  const idx=(AD.contacts||[]).findIndex(function(x){return x.id===id;});
  if(idx<0)return;
  const backup=AD.contacts[idx];
  AD.contacts.splice(idx,1);
  selContactId=null;
  renderAddressBook();
  showToast('삭제 중...');
  try{

  }catch(e){
    AD.contacts.push(backup);
    showToast('삭제 실패','error');
    renderAddressBook();
  }
}

// ===== vCard 다운로드 (스마트폰 연락처에 저장) =====
function downloadVCard(id){
  const c=(AD.contacts||[]).find(function(x){return x.id===id;});
  if(!c){showToast('연락처를 찾을 수 없어요','error');return;}

  // vCard 3.0 포맷
  const lines=['BEGIN:VCARD','VERSION:3.0'];
  // 이름 (FN: 풀네임, N: 성;이름 - 한국 이름은 그냥 통째로)
  lines.push('FN:'+vcEscape(c.name));
  lines.push('N:'+vcEscape(c.name)+';;;;');
  if(c.phone)lines.push('TEL;TYPE=CELL:'+vcEscape(String(c.phone).replace(/[-\s]/g,'')));
  if(c.email)lines.push('EMAIL:'+vcEscape(c.email));
  if(c.address)lines.push('ADR;TYPE=HOME:;;'+vcEscape(c.address)+';;;;');
  if(c.birthday)lines.push('BDAY:'+vcEscape(c.birthday));
  // 메모: 직분 + 가족관계 + 메모 합치기
  const noteParts=[];
  if(c.role)noteParts.push('[직분] '+c.role);
  if(c.family)noteParts.push('[가족] '+c.family);
  if(c.birthday&&c.birthdayType==='lunar')noteParts.push('(생일: 음력 '+c.birthday+')');
  if(c.memo)noteParts.push(c.memo);
  noteParts.push('— 여린교회 주소록');
  if(noteParts.length)lines.push('NOTE:'+vcEscape(noteParts.join('\\n')));
  // 조직
  lines.push('ORG:여린교회');
  if(c.role)lines.push('TITLE:'+vcEscape(c.role));
  lines.push('END:VCARD');

  const vcard=lines.join('\r\n');
  const blob=new Blob([vcard],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=(c.name||'contact')+'.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('연락처 파일을 받아 열어주세요 📲','success');
}

function vcEscape(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/,/g,'\\,').replace(/;/g,'\\;').replace(/\n/g,'\\n');
}

  {key:'mission',label:'선교',icon:'⛪',cls:'cat-mission'},
  {key:'relief',label:'구제',icon:'🤝',cls:'cat-relief'},

];

function getCatInfo(catKey){
  const found=NB_CATEGORIES.find(function(c){return c.key===catKey;});
  return found||{key:'other',label:'기타',icon:'💛',cls:'cat-other'};
}

function nbMatchesSearch(nb,query){
  if(!query)return true;
  const q=String(query).toLowerCase().trim();
  if(!q)return true;
  if(String(nb.name||'').toLowerCase().includes(q))return true;
  if(String(nb.description||'').toLowerCase().includes(q))return true;
  if(String(nb.customCategory||'').toLowerCase().includes(q))return true;
  return false;
}

  // 필터링
  let filtered=list.filter(function(n){

    +'<span class="ab-search-icon">🔍</span>'

    +'<button class="ab-search-clear'+(nbSearch?' show':'')+'" onclick="clearNbSearch()">✕</button>'
    +'</div>';

    }else{
      html+='<div class="nb-empty">검색 결과가 없어요</div>';
    }
  }else{
    filtered.forEach(function(n){
      const cat=getCatInfo(n.category);
      const catLabel=n.category==='other'&&n.customCategory?n.customCategory:cat.label;
      html+='<div class="nb-card" onclick="openNeighbor(\''+n.id+'\')">'

// ===== 공유 (텍스트 클립보드 복사 + Web Share API) =====
async function shareNeighbor(id){
  const n=(AD.neighbors||[]).find(function(x){return x.id===id;});
  if(!n)return;
  let websiteUrl=String(n.website||'').trim();
  if(websiteUrl&&!websiteUrl.match(/^https?:\/\//))websiteUrl='https://'+websiteUrl;
  const cat=getCatInfo(n.category);
  const catLabel=n.category==='other'&&n.customCategory?n.customCategory:cat.label;

  const lines=[];
  lines.push('💛 여린 이웃 - '+catLabel);
  lines.push(n.name);
  if(n.description)lines.push('');
  if(n.description)lines.push(n.description);
  if(n.supportMethod)lines.push('');
  if(n.supportMethod)lines.push('💝 후원: '+n.supportMethod);
  if(n.phone)lines.push('📞 '+n.phone);
  if(websiteUrl)lines.push('🌐 '+websiteUrl);
  const text=lines.join('\n');

  if(navigator.share){
    try{
      await navigator.share({title:n.name,text:text,url:websiteUrl||undefined});
      return;
    }catch(e){
      if(e&&e.name==='AbortError')return; // 사용자가 취소
      // fallback to clipboard
    }
  }

  try{
    await navigator.clipboard.writeText(text);
    showToast('내용이 복사되었어요 📋','success');
  }catch(e){
    showToast('공유 실패','error');
  }
}
