<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>여린교회 신앙관리</title>
<!-- PWA 설정 -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3D6A48">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="여린교회">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<!-- GAS API URL -->
<script>
  window.GAS_URL = 'https://script.google.com/macros/s/AKfycbz30pVwl4DdXvlKgj6mG_YhQlkjxI5SbG5kYycLmU9ESX7f-YA8JHFVHxNt7wa2WYfN/exec';
</script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--card:#fff;--b9:#2A3A30;--b7:#4D7659;--b5:#8A9485;--b3:#C8D4C0;--b1:#E6ECE0;--b0:#F3F6EF;--gold:#80A685;--green:#4D8556;--purple:#9080C0;--coral:#C07050;--blue:#2B74D6;--deep:#3D6A48;--accent:#B8DCB8;--shadow:0 2px 12px rgba(50,80,60,.06);--r:18px;--max:640px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard Variable','Noto Sans KR',sans-serif;background:linear-gradient(180deg,var(--bg),#F0F3EC);min-height:100vh;color:var(--b9);-webkit-tap-highlight-color:transparent;font-size:16px;line-height:1.6;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

.onboarding{position:fixed;inset:0;z-index:1000;background:var(--bg);}
.ob-slides{display:flex;width:400%;height:100%;transition:transform .4s;}
.ob-slide{width:25%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.ob-icon{font-size:56px;margin-bottom:16px;}
.ob-title{font-size:20px;font-weight:800;color:var(--b7);margin-bottom:8px;}
.ob-desc{font-size:14px;color:var(--b5);line-height:1.7;max-width:300px;}
.ob-dots{display:flex;gap:8px;margin-top:28px;}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--b3);transition:.3s;}
.ob-dot.active{background:var(--b7);width:24px;border-radius:4px;}
.ob-btns{margin-top:20px;display:flex;gap:12px;}
.ob-btn{padding:11px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;}
.ob-skip{background:0;color:var(--b5);}
.ob-next{background:var(--b7);color:#fff;}
.ob-start{background:var(--deep);color:#fff;padding:14px 44px;font-size:15px;}

.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--card);border-radius:24px;padding:28px 22px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(92,64,51,.1);text-align:center;}
.auth-box h1{font-size:18px;font-weight:800;color:var(--b7);margin-bottom:2px;}
.auth-box .sub{font-size:11px;color:var(--b5);margin-bottom:16px;}
.auth-toggle{font-size:12px;color:var(--b5);margin-top:14px;}
.auth-toggle a{color:var(--b7);font-weight:700;cursor:pointer;text-decoration:none;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:10px;}
.emoji-opt{width:40px;height:40px;border-radius:50%;border:3px solid var(--b1);background:var(--b0);font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.emoji-opt.sel{border-color:var(--b7);background:var(--b1);transform:scale(1.1);}
.error-msg{color:var(--coral);font-size:11px;margin-top:4px;min-height:14px;}

.app{display:none;}
.top-bar{background:linear-gradient(135deg,var(--deep),var(--b9));padding:18px 22px;color:#F0F5E8;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}
.top-bar-left{display:flex;align-items:center;gap:10px;}
.profile-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}

.bottom-bar{position:fixed;bottom:12px;left:12px;right:12px;background:var(--card);border:1px solid var(--b1);border-radius:22px;box-shadow:0 6px 20px rgba(30,50,30,.08);z-index:200;padding:6px;max-width:calc(var(--max) - 24px);margin:0 auto;}
.bottom-inner{display:flex;}
.btab{flex:1;padding:10px 0;border:none;background:none;font-size:10px;color:#B0B8AA;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;transition:.2s;border-radius:16px;font-weight:700;letter-spacing:.3px;}
.btab.active{color:#fff;background:var(--b9);}
.btab .bico{font-size:22px;line-height:1;}
.badge{position:absolute;top:3px;right:calc(50% - 24px);background:var(--coral);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

.content{max-width:var(--max);margin:0 auto;padding:16px 18px 110px;}
.page{display:none;animation:fadeUp .2s;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(min-width:768px){.content{padding:20px 28px 104px;}}
@media(min-width:1024px){:root{--max:720px;}}

.card{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(208,216,202,.4);}
.btn-primary{padding:13px 26px;border-radius:14px;border:none;background:var(--b7);color:#fff;font-size:15px;font-weight:700;letter-spacing:-.2px;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-full{width:100%;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;letter-spacing:-.2px;}
.btn-sm{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;}
.btn-dashed{width:100%;padding:15px;border-radius:16px;border:2px dashed var(--b3);background:0;color:var(--b7);font-size:14px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px;}
.btn-pill{padding:8px 16px;border-radius:999px;border:none;font-size:13px;font-weight:700;transition:.15s;}
.btn-more{width:100%;padding:13px;border-radius:12px;border:1px solid var(--b3);background:var(--b0);color:var(--b5);font-size:13px;font-weight:700;margin-top:10px;}
.input-field{width:100%;padding:13px 16px;border-radius:12px;border:1px solid #E0E8DC;font-size:15px;outline:none;background:var(--b0);transition:.15s;}
.input-field:focus{border-color:var(--b7);background:#fff;}
.select-field{width:100%;padding:13px 16px;border-radius:12px;border:1px solid #E0E8DC;font-size:15px;outline:none;background:var(--b0);cursor:pointer;appearance:none;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--b1);}
.fg{margin-bottom:14px;}
.q-label{font-size:13px;font-weight:700;color:var(--b7);margin-bottom:6px;display:block;letter-spacing:-.2px;}

.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-tab{padding:9px 18px;border-radius:999px;border:none;font-size:13px;font-weight:700;transition:.15s;letter-spacing:-.2px;}
.filter-tab.active{background:var(--b9);color:#fff;}
.filter-tab:not(.active){background:var(--b1);color:var(--b7);}

.reaction-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:12px;}
.react-btn{padding:7px 14px;border-radius:999px;border:1px solid var(--b1);background:#fff;font-size:13px;transition:.15s;display:flex;align-items:center;gap:4px;font-weight:600;}
.react-btn.active{border-color:var(--b7);background:var(--b1);color:var(--b7);font-weight:700;}
.react-btn .cnt{font-size:12px;font-weight:800;color:var(--b5);}
.react-btn.active .cnt{color:var(--b7);}
.rx-names{font-size:12px;color:var(--b5);margin-top:6px;line-height:1.5;}
.comment-section{margin-top:12px;border-top:1px solid var(--b1);padding-top:10px;}
.c-item{display:flex;gap:7px;margin-bottom:6px;}
.c-av{width:26px;height:26px;border-radius:50%;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.c-body{font-size:13px;color:#3D4A38;line-height:1.5;}
.c-name{font-weight:700;margin-right:3px;}
.c-date{font-size:11px;color:var(--b5);margin-left:4px;}
.c-del{border:none;background:none;color:var(--b5);font-size:11px;margin-left:3px;text-decoration:underline;}
.c-input-row{display:flex;gap:6px;margin-top:6px;}
.c-input-row input{flex:1;padding:9px 16px;border-radius:999px;border:1px solid #E0E8DC;font-size:13px;outline:none;background:var(--b0);}
.c-input-row button{padding:9px 18px;border-radius:999px;border:none;background:var(--b7);color:#fff;font-size:12px;font-weight:700;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.popup{background:#fff;border-radius:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.15);position:relative;}
.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:none;background:var(--b1);font-size:15px;display:flex;align-items:center;justify-content:center;}
.popup h3{font-size:17px;font-weight:700;margin-bottom:14px;}

.loading{text-align:center;padding:36px;color:var(--b5);font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid var(--b1);border-top-color:var(--b7);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-wrap{position:relative;min-height:420px;padding-top:6px;}
.load-skeleton{pointer-events:none;}
.sk-box{background:linear-gradient(90deg,rgba(230,236,224,.55) 25%,rgba(243,246,239,.9) 50%,rgba(230,236,224,.55) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:8px;display:block;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.load-verse{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(100%,320px);background:linear-gradient(135deg,var(--deep),var(--b7));color:#fff;border-radius:20px;padding:28px 24px 24px;box-shadow:0 12px 32px rgba(61,106,72,.25);animation:verseIn .5s ease-out;z-index:2;}
@keyframes verseIn{from{opacity:0;transform:translate(-50%,-40%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.load-verse-label{font-size:10px;letter-spacing:2.5px;font-weight:800;color:var(--accent);margin-bottom:12px;text-align:center;}
.load-verse-text{font-size:16px;line-height:1.75;font-weight:500;text-align:center;margin-bottom:14px;min-height:48px;}
.load-verse-ref{font-size:11px;color:var(--accent);font-weight:800;text-align:center;margin-bottom:18px;}
.load-verse-dots{display:flex;justify-content:center;gap:6px;}
.load-verse-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.35;animation:dotPulse 1.4s ease-in-out infinite;}
.load-verse-dots span:nth-child(2){animation-delay:.2s;}
.load-verse-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,60%,100%{opacity:.35;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}

.toast{position:fixed;bottom:94px;right:16px;background:rgba(26,36,32,.92);color:#fff;padding:10px 16px;border-radius:999px;font-size:12px;font-weight:700;z-index:300;display:flex;align-items:center;gap:6px;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(10px);}
.toast .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;}
.toast.success .dot{background:#7ADD9D;animation:none;}
.toast.error{background:var(--coral);}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.progress-bar-bg{background:var(--b1);border-radius:8px;height:10px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:8px;transition:width .4s;}
.cat-label{font-size:14px;font-weight:700;margin-bottom:6px;padding:0 4px;}
.book-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.book-tile{padding:8px 10px;border-radius:8px;border:none;font-size:13px;position:relative;overflow:hidden;transition:.2s;outline:none;}
.book-tile .micro-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:2px;}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:5px;}
.ch-btn{aspect-ratio:1;border-radius:8px;border:none;font-size:14px;transition:.2s;width:100%;outline:none;position:relative;}
.ch-btn.saving::after{content:'';position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1s infinite;}

.back-btn{background:none;border:none;color:var(--b7);font-size:14px;font-weight:700;margin-bottom:12px;padding:4px 0;cursor:pointer;}

.sub-tabs{display:flex;background:var(--b1);border-radius:999px;padding:4px;margin-bottom:14px;}
.sub-tab{flex:1;padding:11px 6px;border:none;border-radius:999px;background:0;font-size:13px;font-weight:600;color:var(--b5);transition:.2s;text-align:center;letter-spacing:-.2px;position:relative;}
.sub-tab.active{background:var(--card);color:var(--b7);font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.06);}

.accordion-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 0;font-size:15px;font-weight:700;}
.accordion-body{overflow:hidden;max-height:0;transition:max-height .3s;}
.accordion-body.open{max-height:800px;}
.member-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.member-row:last-child{border-bottom:none;}

.ch-card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--gold);cursor:pointer;}
.ch-meta{font-size:13px;color:var(--b5);margin-bottom:6px;}
.ch-members{display:flex;align-items:center;margin-bottom:6px;}
.ch-member-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #fff;margin-left:-5px;background:var(--b1);}
.ch-member-av:first-child{margin-left:0;}
.ch-progress{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.ch-progress .pname{font-size:13px;font-weight:600;min-width:52px;}
.ch-progress .pct{font-size:12px;font-weight:700;color:var(--b5);min-width:34px;text-align:right;}
.cert-log{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;}
.cert-dot{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}

.qt-section{margin-bottom:8px;padding:12px 14px;border-radius:10px;background:var(--b0);font-size:14px;line-height:1.6;color:#4A3F35;}
.qt-section-label{font-size:12px;font-weight:700;color:var(--b5);margin-bottom:3px;}

.cal-nav{display:flex;justify-content:space-between;align-items:center;}
.cal-nav button{background:none;border:none;font-size:22px;color:var(--b7);}
.cal-nav h2{font-size:18px;font-weight:700;}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.cal-hdr div{text-align:center;font-size:14px;font-weight:600;padding:5px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{padding:4px 3px;min-height:76px;border-radius:6px;border:1px solid var(--b1);cursor:pointer;}
.cal-cell.today{background:rgba(92,64,51,.06);border:2px solid var(--b7);}
.cal-day{font-size:14px;text-align:center;margin-bottom:2px;font-weight:500;}
.cal-ev{font-size:11px;padding:2px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;}
.evt-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b1);cursor:pointer;}
.evt-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cat-tab{padding:7px 14px;border-radius:18px;border:none;font-size:13px;font-weight:600;transition:.15s;}

.edit-menu-btn{background:none;border:none;font-size:20px;color:var(--b5);padding:4px 6px;}
.edit-dropdown{position:absolute;right:8px;top:40px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);overflow:hidden;z-index:50;}
.edit-dropdown button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;}
.edit-dropdown button:hover{background:var(--b1);}

.my-header{text-align:center;padding:24px 0;}
.my-avatar{width:72px;height:72px;border-radius:50%;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 10px;}
.my-name{font-size:22px;font-weight:800;}
.my-bio{font-size:14px;color:var(--b5);margin-top:3px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;}
.stat-item{text-align:center;padding:12px 4px;background:var(--b0);border-radius:12px;}
.stat-num{font-size:22px;font-weight:800;color:var(--b7);}
.stat-label{font-size:11px;color:var(--b5);margin-top:2px;}
.my-menu-item{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--b1);font-size:16px;font-weight:500;cursor:pointer;}
.my-menu-item:last-child{border-bottom:none;}
.my-menu-item .mi-icon{font-size:20px;width:28px;text-align:center;}

.mini-cal{margin-bottom:14px;}
.mini-cal .mc-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-cal .mc-hdr div{text-align:center;font-size:11px;font-weight:600;color:var(--b5);padding:3px;}
.mini-cal .mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mini-cal .mc-cell{text-align:center;padding:6px 2px;font-size:12px;border-radius:4px;cursor:pointer;}
.mini-cal .mc-cell.has{background:var(--gold);color:#fff;font-weight:700;}
.mini-cal .mc-cell.sel{border:2px solid var(--b7);}

.yeorin-img{height:22px;vertical-align:middle;border-radius:50%;margin-right:4px;}
.yeorin-img-lg{height:28px;border-radius:50%;margin-right:6px;}

.pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:-.2px;}
.pill-green-l{background:#E6F0E0;color:#3D6A48;}
.pill-blue-l{background:#DEE8F5;color:#234A7A;}
.worship-item{background:var(--card);border-radius:18px;padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid rgba(208,216,202,.4);cursor:pointer;transition:.15s;}
.worship-item:active{transform:scale(.98);}
.wi-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.wi-num{font-size:11px;color:var(--b5);font-weight:700;letter-spacing:.5px;}
.wi-date{font-size:12px;color:var(--b5);font-weight:700;flex:1;}
.wi-title{font-size:17px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px;}
.wi-verse{font-size:12px;color:var(--b7);font-weight:700;}
.wi-empty{font-size:12px;color:var(--b5);font-style:italic;}
.worship-hero{background:linear-gradient(135deg,var(--deep),var(--b7));color:#fff;border-radius:22px;padding:20px 22px 24px;margin-bottom:14px;position:relative;overflow:hidden;}
.worship-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.wh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative;z-index:1;}
.wh-date{font-size:11px;letter-spacing:1.5px;color:var(--accent);font-weight:800;}
.wh-settings{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 10px;border-radius:999px;cursor:pointer;font-size:13px;}
.wh-title{font-size:24px;font-weight:900;letter-spacing:-.8px;line-height:1.2;margin-bottom:6px;position:relative;z-index:1;}
.wh-sub{font-size:12px;color:var(--accent);font-weight:600;position:relative;z-index:1;}

// 시간 전 표시
function timeAgo(ts){
  if(!ts)return'';
  const t=new Date(String(ts).replace(' ','T')).getTime();
  if(isNaN(t))return'';
  const diff=Date.now()-t;
  const min=Math.floor(diff/60000);
  if(min<1)return'방금';
  if(min<60)return min+'분 전';
  const hr=Math.floor(min/60);
  if(hr<24)return hr+'시간 전';
  const d=Math.floor(hr/24);
  if(d<2)return'어제';
  if(d<7)return d+'일 전';
  const dd=new Date(t);
  return(dd.getMonth()+1)+'/'+dd.getDate();
}

// 유튜브 URL 추출 (shorts/live 포함)
function getYoutubeId(url){
  if(!url)return'';
  const m=String(url).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([^&?#/]+)/);
  return m?m[1]:'';
}
function getYoutubeThumb(url){
  const id=getYoutubeId(url);
  return id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':'';
}

// GAS API 호출
function gas(fn,...a){
  return fetch(window.GAS_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({fn:fn,args:a})
  }).then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.json();
  }).then(function(r){
    if(r.error)throw new Error(r.error);
    return r.data;
  });
}

    const l=rx[r.k]||[];

    return r.e+' '+l.map(function(u){return escapeHtml(gm(u).name);}).join(', ');
  }).filter(function(x){return x;}).join(' · ');
  return '<div class="reaction-row">'+btns+'</div>'+(lines?'<div class="rx-names">'+lines+'</div>':'');
}

async function togRx(type,id,key){
  const arr=type==='qt'?qtPosts:prPosts;
  const it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;
  if(!it.reactions)it.reactions={};
  const wasActive=it.reactions[key]&&it.reactions[key].includes(CU.id);

  // 낙관적 업데이트
  if(!it.reactions[key])it.reactions[key]=[];
  const idx=it.reactions[key].indexOf(CU.id);
  if(idx>-1)it.reactions[key].splice(idx,1);
  else it.reactions[key].push(CU.id);
  type==='qt'?renderQt():renderPrayer();

  // 서버
  try{
    await gas('toggleReaction',type,id,key,CU.id);
  }catch(e){
    // 실패 시 원복
    const idx2=it.reactions[key].indexOf(CU.id);
    if(wasActive){if(idx2===-1)it.reactions[key].push(CU.id);}
    else{if(idx2>-1)it.reactions[key].splice(idx2,1);}
    type==='qt'?renderQt():renderPrayer();
    showToast('공감 저장 실패, 다시 시도해주세요','error');
  }
}

function renderCm(cm,type,id){
  const items=(cm||[]).map(function(c){
    const m=gm(c.a),own=c.a===CU.id;
    return '<div class="c-item"><div class="c-av">'+m.emoji+'</div><div class="c-body"><span class="c-name">'+escapeHtml(m.name)+'</span>'+escapeHtml(c.t)+'<span class="c-date">'+escapeHtml(c.d||'')+'</span>'+(own?'<button class="c-del" onclick="delCm(\''+c.id+'\',\''+type+'\')">삭제</button>':'')+'</div></div>';
  }).join('');
  return '<div class="comment-section">'+items+'<div class="c-input-row"><input placeholder="댓글..." id="ci-'+type+'-'+id+'"><button onclick="addCm(\''+type+'\',\''+id+'\')">등록</button></div></div>';
}

async function addCm(type,id){
  const inp=document.getElementById('ci-'+type+'-'+id);
  if(!inp||!inp.value.trim())return;
  const t=inp.value.trim();
  const arr=type==='qt'?qtPosts:prPosts;
  const it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;
  const tempId='t'+Date.now();
  if(!it.comments)it.comments=[];
  const tempCmt={id:tempId,a:CU.id,t:t,d:td()};
  it.comments.push(tempCmt);
  inp.value='';
  type==='qt'?renderQt():renderPrayer();
  try{
    const res=await gas('addComment',type,id,CU.id,t);
    if(res&&res.id){
      const cmt=it.comments.find(function(c){return c.id===tempId;});
      if(cmt)cmt.id=res.id;
    }
  }catch(e){
    it.comments=it.comments.filter(function(c){return c.id!==tempId;});
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 저장 실패, 다시 시도해주세요','error');
  }
}

async function delCm(cid,type){
  const arr=type==='qt'?qtPosts:prPosts;
  const backup=[];
  arr.forEach(function(p){
    if(p.comments){
      p.comments.forEach(function(c){
        if(c.id===cid)backup.push({postId:p.id,cmt:JSON.parse(JSON.stringify(c))});
      });
    }
  });
  arr.forEach(function(p){if(p.comments)p.comments=p.comments.filter(function(c){return c.id!==cid;});});
  type==='qt'?renderQt():renderPrayer();
  try{
    await gas('deleteComment',cid,CU.id);
  }catch(e){
    backup.forEach(function(b){
      const p=arr.find(function(x){return x.id===b.postId;});
      if(p){if(!p.comments)p.comments=[];p.comments.push(b.cmt);}
    });
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 삭제 실패, 다시 시도해주세요','error');
  }
}

// 🔧 버그 수정: busy 플래그 제거, 필수값 토스트 알림, 버튼 disabled
async function addQT(){
  const b=document.getElementById('qB').value;
  const cf=document.getElementById('qCF').value.trim();
  const vf=document.getElementById('qVF').value.trim();
  const ct=document.getElementById('qCT').value.trim()||cf;
  const vt=document.getElementById('qVT').value.trim()||vf;
  const bv=document.getElementById('qBV').value.trim();
  const ap=document.getElementById('qAP').value.trim();
  const sh=document.getElementById('qSH').value.trim();
  const qq=document.getElementById('qQQ').value.trim();

  // 필수값 체크 → 토스트로 알림 (조용히 튕기지 않음)
  if(!b){showToast('성경 책을 선택해주세요','error');return;}
  if(!cf){showToast('장을 입력해주세요','error');return;}
  if(!ap&&!sh){showToast('적용할 점 또는 나누고 싶은 내용을 입력해주세요','error');return;}

  // 저장 중 버튼 비활성화 (연타 방지)
  const btn=document.getElementById('qtSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  // 낙관적 업데이트
  const tempId='temp_'+Date.now();
  const today=td();
  const tempPost={id:tempId,authorId:CU.id,book:b,chFrom:cf,chTo:ct,vsFrom:vf||'1',vsTo:vt||vf||'1',bestVerse:bv,applyContent:ap,shareContent:sh,question:qq,date:today,reactions:{},comments:[],_pending:true};
  qtPosts.unshift(tempPost);
  sqf=false;
  renderQt();
  showToast('저장 중...');

  try{
    const r=await gas('addQTPost',CU.id,b,cf,ct,vf||'1',vt||vf||'1',bv,ap,sh,qq);
    const idx=qtPosts.findIndex(function(p){return p.id===tempId;});
    if(idx>=0&&r&&r.id){qtPosts[idx].id=r.id;qtPosts[idx]._pending=false;}
    showToast('저장 완료 ✓','success');
    renderQt();
  }catch(e){
    qtPosts=qtPosts.filter(function(p){return p.id!==tempId;});
    sqf=true;
    showToast('저장 실패, 다시 시도해주세요','error');
    renderQt();
  }
}

async function delQT(id){

// ============================================================
// 읽기표 (책 목록 → 장 그리드)
// ============================================================
function renderReading(bpSet){
  // 특정 책을 선택한 경우: 장 그리드
  if(selBook!==null){
    const bk=BIBLE[selBook];
    const co=CC[bk.cat];
    let chs='';
    const readChs=[];
    for(let i=0;i<bk.c;i++){
      const k=selBook+'-'+i;
      const ir=bpSet.has(k);
      if(ir)readChs.push(i+1);
      const sav=savingChapters[k]?' saving':'';
      chs+='<button class="ch-btn'+sav+'" onclick="toggleCh('+selBook+','+i+')" style="background:'+(ir?co.a:'#F8F5F0')+';color:'+(ir?'#fff':'var(--b5)')+';font-weight:'+(ir?700:400)+'">'+(i+1)+'</button>';
    }

    // 읽은 장 범위 요약
    let rangeStr='아직 없어요';
    if(readChs.length){
      const rng=[];
      let s=readChs[0],e=s;
      for(let j=1;j<readChs.length;j++){
        if(readChs[j]===e+1)e=readChs[j];
        else{rng.push(s===e?s+'장':s+'~'+e+'장');s=readChs[j];e=s;}
      }
      rng.push(s===e?s+'장':s+'~'+e+'장');
      rangeStr=rng.join(', ');
    }
    const rp=Math.round(readChs.length/bk.c*100);

    return '<button class="back-btn" onclick="selBook=null;renderBible()">← 목록</button>'
      +'<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<div style="font-size:16px;font-weight:700">'+bk.n+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:var(--b7)">'+rp+'%</div></div>'
      +'<div style="font-size:13px;color:var(--b5);margin-bottom:4px">전체 '+bk.c+'장 중 '+readChs.length+'장</div>'
      +'<div class="progress-bar-bg" style="margin-bottom:8px"><div class="progress-bar-fill" style="width:'+rp+'%;background:'+co.a+'"></div></div>'
      +'<div style="font-size:13px;color:var(--b7);background:var(--b0);padding:10px 12px;border-radius:8px;margin-bottom:12px">📖 '+rangeStr+'</div>'
      +'<div class="chapter-grid">'+chs+'</div></div>'
      +'<div id="yeorinBible"></div>'
      +'<button class="btn-dashed" style="border-color:var(--green);color:var(--green)" onclick="askYeorinBibleUI(\''+bk.n+'\')"><img class="yeorin-img" src="'+YIMG+'"> 여린이에게 물어보기</button>';
  }

  // 카테고리별 책 타일
  let cats='';
  CATS.forEach(function(cat){
    const bks=BIBLE.map(function(b,i){return Object.assign({},b,{idx:i});}).filter(function(b){return b.cat===cat;});
    if(!bks.length)return;
    const co=CC[cat];
    let tiles='';
    bks.forEach(function(bk){
      let br=0;
      for(let i=0;i<bk.c;i++)if(bpSet.has(bk.idx+'-'+i))br++;
      const p=Math.round(br/bk.c*100);
      tiles+='<button class="book-tile" onclick="selBook='+bk.idx+';renderBible()" style="background:'+(p===100?co.a:p>0?co.bg:'#F8F5F0')+';color:'+(p===100?'#fff':co.t)+';font-weight:'+(p>0?600:400)+'">'+bk.n+(p>0?' '+br+'/'+bk.c:'')+(p===100?' ✓':'')+(p>0&&p<100?'<div class="micro-bar" style="width:'+p+'%;background:'+co.a+'"></div>':'')+'</button>';
    });
    cats+='<div style="background:'+co.bg+'30;border-radius:10px;padding:8px 8px 4px;margin-bottom:8px"><div class="cat-label" style="color:'+co.t+'">'+cat+'</div><div class="book-grid">'+tiles+'</div></div>';
  });
  return cats;
}

// ============================================================
// 장 체크 토글 (낙관적 업데이트 + 실패 복구)
// ============================================================
async function toggleCh(bi,ch){
  const k=bi+'-'+ch;
  if(savingChapters[k])return;  // 중복 클릭 방지

  const bp=AD.myBibleProgress;
  const abp=AD.allBibleProgress;
  const wasChecked=bp.indexOf(k)>-1;

  // 낙관적 업데이트
  if(wasChecked){
    const idxs=[];
    bp.forEach(function(v,i){if(v===k)idxs.push(i);});
    for(let i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
    if(abp[CU.id]){
      const ai=[];
      abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});
      for(let i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);
    }
  }else{
    bp.push(k);
    if(!abp[CU.id])abp[CU.id]=[];
    abp[CU.id].push(k);
  }

  savingChapters[k]=true;
  showToast('저장 중...');
  renderBible();

  try{
    await gas('toggleBibleChapter',CU.id,k);
    delete savingChapters[k];
    showToast('저장됨','success');
    renderBible();
  }catch(e){
    // 실패 시 복구
    delete savingChapters[k];
    if(wasChecked){
      bp.push(k);
      if(!abp[CU.id])abp[CU.id]=[];
      abp[CU.id].push(k);
    }else{
      const idxs=[];
      bp.forEach(function(v,i){if(v===k)idxs.push(i);});
      for(let i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
      if(abp[CU.id]){
        const ai=[];
        abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});
        for(let i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);
      }
    }
    showToast('저장 실패, 다시 시도해주세요','error');
    renderBible();
  }
}

// 읽기 상세 (사용자별 팝업)

function showReadDetail(uid){
  const usr=gm(uid);
  const bp=uid===CU.id?(AD.myBibleProgress||[]):((AD.allBibleProgress||{})[uid]||[]);
  const rc=bp.length;
  const pct=Math.round(rc/TC*100);

  // 책별로 읽은 장 묶기
  const bm={};
  bp.forEach(function(k){
    const p=String(k).split('-');
    const bi=parseInt(p[0]);
    if(isNaN(bi))return;
    if(!bm[bi])bm[bi]=[];
    bm[bi].push(parseInt(p[1])+1);
  });

  let bl='';
  if(!Object.keys(bm).length){
    bl='<div style="text-align:center;padding:16px;color:var(--b5);font-size:14px">아직 읽은 장이 없어요</div>';
  }else{
    Object.entries(bm).sort(function(a,b){return a[0]-b[0];}).forEach(function(entry){
      const bi=entry[0],chs=entry[1];
      const bk=BIBLE[bi];
      if(!bk)return;
      const co=CC[bk.cat];
      chs.sort(function(a,b){return a-b;});

      // 범위 요약
      const rng=[];
      let s=chs[0],e=s;
      for(let i=1;i<chs.length;i++){
        if(chs[i]===e+1)e=chs[i];
        else{rng.push(s===e?s+'장':s+'~'+e+'장');s=chs[i];e=s;}
      }
      rng.push(s===e?s+'장':s+'~'+e+'장');

      bl+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)">'
        +'<span style="font-size:14px;font-weight:600;min-width:65px;color:'+co.t+'">'+bk.n+'</span>'
        +'<div class="progress-bar-bg" style="flex:1;height:6px"><div class="progress-bar-fill" style="width:'+Math.round(chs.length/bk.c*100)+'%;background:'+co.a+'"></div></div>'
        +'<span style="font-size:12px;color:var(--b5)">'+chs.length+'/'+bk.c+'</span></div>'
        +'<div style="font-size:11px;color:var(--b3);padding:2px 0 4px 73px">'+rng.join(', ')+'</div>';
    });
  }

  showPopup('<button class="popup-close" onclick="closePopup()">✕</button>'
    +'<div style="text-align:center;margin-bottom:14px">'
    +'<div style="font-size:36px">'+usr.emoji+'</div>'
    +'<div style="font-size:20px;font-weight:800">'+escapeHtml(usr.name)+'님의 읽기 현황</div>'
    +'<div style="font-size:14px;color:var(--b5)">'+rc+'장 ('+pct+'%)</div>'
    +'<div class="progress-bar-bg" style="margin:8px auto;max-width:200px"><div class="progress-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--b7))"></div></div>'
    +'</div>'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:8px">📚 읽은 성경</div>'+bl);
}

      +(isMem?'<div class="ch-progress"><span class="pname">'+CU.emoji+'나</span>'
        +'<div class="progress-bar-bg" style="flex:1"><div class="progress-bar-fill" style="width:'+mp+'%;background:var(--gold)"></div></div>'
        +'<span class="pct">'+mp+'%</span></div>':'')
      +'</div>';
  }).join('');

  if(!list){
    list='<div style="text-align:center;padding:20px;color:var(--b5)">'+(chFilter==='completed'?'완료된 챌린지가 없어요':'진행 중인 챌린지가 없어요')+'</div>';
  }

  // 새 챌린지 폼
  const newForm=schf?'<div class="card">'
    +'<div class="fg"><label class="q-label">📌 이름</label><input class="input-field" id="chT"></div>'
    +'<div class="fg"><label class="q-label">📖 성경</label><select class="select-field" id="chB">'+BN.map(function(b){return '<option>'+b+'</option>';}).join('')+'</select></div>'
    +'<div class="fg" style="display:flex;gap:6px">'
    +'<div style="flex:1"><label class="q-label">시작</label><input type="date" class="input-field" id="chS"></div>'
    +'<div style="flex:1"><label class="q-label">종료</label><input type="date" class="input-field" id="chE"></div>'
    +'</div>'
    +'<button class="btn-primary" id="chCreateBtn" onclick="createCh()">만들기</button>'
    +'</div>':'';

  return '<button class="btn-dashed" onclick="schf=!schf;renderBible()">'+(schf?'닫기':'🏆 새 챌린지')+'</button>'+newForm+fTabs+list;
}

// ============================================================
// 챌린지 상세
// ============================================================
function renderChDetail(cid){
  const ch=AD.challenges.find(function(c){return c.id===cid;});
  if(!ch)return'<button class="back-btn" onclick="viewChId=null;renderBible()">← 목록</button>';

  const certs=AD.challengeCerts.filter(function(c){return c.challengeId===cid;});
  const days=Math.max(Math.ceil((new Date(ch.endDate)-new Date(ch.startDate))/864e5)+1,1);
  const isMem=ch.memberIds.includes(CU.id);
  const isCr=ch.creatorId===CU.id;
  const todayCerted=certs.some(function(c){return c.userId===CU.id&&c.date===td();});

  // 멤버별 진행률
  const memberStats=ch.memberIds.map(function(uid){
    const cnt=certs.filter(function(c){return c.userId===uid;}).length;
    return{uid:uid,cnt:cnt,pct:Math.round(cnt/days*100)};
  }).sort(function(a,b){return b.cnt-a.cnt;});

  const mp=memberStats.map(function(ms){
    return '<div class="ch-progress">'
      +'<span class="pname">'+gm(ms.uid).emoji+escapeHtml(gm(ms.uid).name)+'</span>'
      +'<div class="progress-bar-bg" style="flex:1"><div class="progress-bar-fill" style="width:'+ms.pct+'%;background:'+(ms.uid===CU.id?'var(--gold)':'var(--green)')+'"></div></div>'
      +'<span class="pct">'+ms.pct+'%</span></div>';
  }).join('');

  // 내 인증 기록 (날짜별 도트)
  const myCerts=new Set(certs.filter(function(c){return c.userId===CU.id;}).map(function(c){return c.date;}));
  const st=new Date(ch.startDate);
  let dots='';
  for(let i=0;i<Math.min(days,42);i++){
    const d=new Date(st);d.setDate(d.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const done=myCerts.has(ds);
    const past=ds<=td();
    dots+='<div class="cert-dot" style="background:'+(done?'var(--gold)':past?'#E8D4D4':'var(--b1)')+';color:'+(done?'#fff':'var(--b5)')+'">'+d.getDate()+'</div>';
  }

  const op=ch.memberIds.length*days>0?Math.round(certs.length/(ch.memberIds.length*days)*100):0;

  return '<button class="back-btn" onclick="viewChId=null;renderBible()">← 목록</button>'
    +'<div class="card">'
    +'<div style="font-size:17px;font-weight:700;margin-bottom:2px">'+escapeHtml(ch.title)+(ch.status==='completed'?' ✅':'')+'</div>'
    +'<div class="ch-meta">📖 '+escapeHtml(ch.book)+' · '+ch.startDate+'~'+ch.endDate+' · '+ch.memberIds.length+'명 · 전체 '+op+'%</div>'
    +(isMem&&ch.status==='active'&&!todayCerted?'<button class="btn-full" onclick="certToday(\''+cid+'\')" style="background:var(--gold);color:#fff;margin:10px 0">✅ 오늘 읽었어요!</button>':'')
    +(isMem&&todayCerted?'<div style="text-align:center;padding:10px;background:#E8F5E8;border-radius:8px;margin:10px 0;font-size:14px;font-weight:600;color:var(--green)">✅ 오늘 인증 완료!</div>':'')
    +(!isMem&&ch.status==='active'?'<button class="btn-full" onclick="joinCh(\''+cid+'\')" style="background:var(--gold);color:#fff;margin:10px 0">🙋 참여하기</button>':'')
    +'</div>'
    +'<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:8px">참여자 현황</div>'+mp+'</div>'
    +(isMem?'<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:6px">인증 기록</div><div class="cert-log">'+dots+'</div><div style="font-size:10px;color:var(--b5);margin-top:4px">🟡인증 🔴미인증 ⬜예정</div></div>':'')
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">'
    +(isCr&&ch.status==='active'?'<button class="btn-sm" onclick="completeCh(\''+cid+'\')" style="background:var(--green);color:#fff">✅ 완료</button>':'')
    +(isCr?'<button class="btn-sm" onclick="deleteCh(\''+cid+'\')" style="background:#E8D4D4;color:#6E2E2E">🗑 삭제</button>':'')
    +'</div>';
}

// 오늘 인증
async function certToday(cid){
  AD.challengeCerts.push({challengeId:cid,userId:CU.id,date:td()});
  renderBible();
  showToast('인증 중...');
  try{
    await gas('certChallenge',cid,CU.id,td());
    showToast('인증 완료 ✓','success');
  }catch(e){
    AD.challengeCerts=AD.challengeCerts.filter(function(c){return !(c.challengeId===cid&&c.userId===CU.id&&c.date===td());});
    renderBible();
    showToast('인증 실패','error');
  }
}

// 챌린지 생성
async function createCh(){
  const t=document.getElementById('chT').value.trim();
  const b=document.getElementById('chB').value;
  const s=document.getElementById('chS').value;
  const e=document.getElementById('chE').value;

  if(!t){showToast('이름을 입력해주세요','error');return;}
  if(!s||!e){showToast('시작/종료일을 선택해주세요','error');return;}

  const btn=document.getElementById('chCreateBtn');
  if(btn){btn.disabled=true;btn.textContent='생성 중...';}

  try{
    const res=await gas('createChallenge',t,b,BN.indexOf(b),s,e,CU.id);
    if(res&&res.id){
      AD.challenges.push({
        id:res.id,title:t,book:b,bookIdx:BN.indexOf(b),
        startDate:s,endDate:e,creatorId:CU.id,memberIds:[CU.id],status:'active'
      });
    }
    schf=false;
    showToast('챌린지 생성 완료 ✓','success');
    renderBible();
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='만들기';}
    showToast('생성 실패, 다시 시도해주세요','error');
  }
}

// 챌린지 참여
async function joinCh(id){
  const ch=AD.challenges.find(function(c){return c.id===id;});
  if(ch&&!ch.memberIds.includes(CU.id))ch.memberIds.push(CU.id);
  renderBible();
  showToast('참여 중...');
  try{
    await gas('joinChallenge',id,CU.id);
    showToast('참여 완료 ✓','success');
  }catch(e){
    if(ch)ch.memberIds=ch.memberIds.filter(function(m){return m!==CU.id;});
    renderBible();
    showToast('참여 실패','error');
  }
}

// 챌린지 삭제
async function deleteCh(id){
  if(!confirm('삭제하시겠습니까?'))return;
  const backup=AD.challenges.find(function(c){return c.id===id;});
  const certBackup=AD.challengeCerts.filter(function(c){return c.challengeId===id;});
  AD.challenges=AD.challenges.filter(function(c){return c.id!==id;});
  AD.challengeCerts=AD.challengeCerts.filter(function(c){return c.challengeId!==id;});
  viewChId=null;
  renderBible();
  showToast('삭제 중...');
  try{
    await gas('deleteChallenge',id,CU.id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    if(backup)AD.challenges.push(backup);
    AD.challengeCerts=AD.challengeCerts.concat(certBackup);
    renderBible();
    showToast('삭제 실패','error');
  }
}

// 챌린지 완료 처리
async function completeCh(id){
  if(!confirm('챌린지를 완료 처리하시겠습니까?'))return;
  const ch=AD.challenges.find(function(c){return c.id===id;});
  if(ch)ch.status='completed';
  renderBible();
  showToast('완료 처리 중...');
  try{
    await gas('completeChallenge',id,CU.id);
    showToast('완료 처리됨 ✓','success');
  }catch(e){
    if(ch)ch.status='active';
    renderBible();
    showToast('완료 처리 실패','error');
  }
}

// - 🐛 미니 캘린더 이전달 버튼 버그 수정 (둘 다 cm++ 썼던 것 → prev/next 분리)
// - 일정 CRUD 전부 낙관적 업데이트 (전체 리로드 제거)
// - showSub/hideSub → showToast

// ============================================================
// 메인 캘린더
// ============================================================
function renderCalendar(){
  const el=document.getElementById('page-calendar');
  if(!AD){el.innerHTML=loadingView('calendar','일정을 불러오고 있어요');return;}

  const ms=cy+'-'+pd(cm+1);
  const fd_=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();
  const ts=td();

  // 요일 헤더
  const dh=['일','월','화','수','목','금','토'].map(function(d,i){
    return '<div style="color:'+(i===0?'var(--coral)':i===6?'var(--blue)':'var(--b5)')+'">'+d+'</div>';
  }).join('');

  // 날짜 셀
  let cells='';
  for(let i=0;i<fd_;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=ms+'-'+pd(d);
    const evts=(AD.calendarEvents||[]).filter(function(e){return e.date===ds;});
    const it=ds===ts;
    const dow=new Date(cy,cm,d).getDay();
    const dots=evts.slice(0,4).map(function(ev){
      const e=ET[ev.type]||ET.etc;
      const titleShort=ev.title.length>5?ev.title.slice(0,5)+'…':ev.title;
      return '<div class="cal-ev" style="background:'+e.c+'20;color:'+e.c+'">'+e.i+escapeHtml(titleShort)+'</div>';
    }).join('');
    cells+='<div class="cal-cell'+(it?' today':'')+'" onclick="showDayEvts(\''+ds+'\')">'
      +'<div class="cal-day" style="color:'+(dow===0?'var(--coral)':dow===6?'var(--blue)':'#4A3F35')+';font-weight:'+(it?700:400)+'">'+d+'</div>'
      +dots+'</div>';
  }

  // 카테고리 필터
  const catTabs='<div style="display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap">'
    +'<button class="cat-tab" onclick="cef=\'all\';renderCalendar()" style="background:'+(cef==='all'?'var(--b7)':'var(--b1)')+';color:'+(cef==='all'?'#FAF0E6':'var(--b7)')+'">전체</button>'
    +Object.entries(ET).map(function(entry){
      const k=entry[0],v=entry[1];
      return '<button class="cat-tab" onclick="cef=\''+k+'\';renderCalendar()" style="background:'+(cef===k?v.c:'var(--b1)')+';color:'+(cef===k?'#fff':'var(--b7)')+'">'+v.i+v.l+'</button>';
    }).join('')+'</div>';

  // 이번 달 일정 리스트
  const mEvts=(AD.calendarEvents||[]).filter(function(e){
    return e.date.startsWith(ms)&&(cef==='all'||e.type===cef);
  }).sort(function(a,b){return a.date.localeCompare(b.date);});

  const evtList=mEvts.map(function(ev){
    const e=ET[ev.type]||ET.etc;
    const dd=ev.date.split('-');
    return '<div class="evt-row" onclick="showEvtEdit(\''+ev.id+'\')">'
      +'<div class="evt-icon" style="background:'+e.c+'18">'+e.i+'</div>'
      +'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+escapeHtml(ev.title)+'</div>'
      +'<div style="font-size:12px;color:var(--b5)">'+dd[1]+'/'+dd[2]+' · '+escapeHtml(ev.startTime||'')+(ev.endTime?' ~ '+escapeHtml(ev.endTime):'')+'</div></div></div>';
  }).join('');

  // 일정 추가 폼
  const tb=Object.entries(ET).map(function(entry){
    const k=entry[0],v=entry[1];
    return '<button class="cat-tab" onclick="selEt=\''+k+'\';saveEvF();renderCalendar()" style="background:'+(selEt===k?v.c:'var(--b1)')+';color:'+(selEt===k?'#fff':'var(--b7)')+'">'+v.i+v.l+'</button>';
  }).join('');

  const fh=sef?'<div class="card">'
    +'<div class="fg"><label class="q-label">📌 제목</label><input class="input-field" id="evT" value="'+escapeHtml(evFD.t||'')+'"></div>'
    +'<div class="fg"><label class="q-label">📅 날짜</label><input type="date" class="input-field" id="evD" value="'+(evFD.d||'')+'"></div>'
    +'<div class="fg" style="display:flex;gap:6px">'
    +'<div style="flex:1"><label class="q-label">⏰ 시작</label><input type="time" class="input-field" id="evS" value="'+(evFD.s||'')+'"></div>'
    +'<div style="flex:1"><label class="q-label">⏰ 종료</label><input type="time" class="input-field" id="evE" value="'+(evFD.e||'')+'"></div>'
    +'</div>'
    +'<div class="fg"><label class="q-label">📂 카테고리</label><div style="display:flex;flex-wrap:wrap;gap:4px">'+tb+'</div></div>'
    +(selEt==='etc'?'<div class="fg"><input class="input-field" id="evCT" placeholder="직접 입력" value="'+escapeHtml(evFD.ct||'')+'"></div>':'')
    +'<div class="fg"><label class="q-label">📝 상세</label><textarea class="input-field" id="evDt" rows="2" style="resize:none">'+escapeHtml(evFD.dt||'')+'</textarea></div>'
    +'<button class="btn-primary" id="evAddBtn" onclick="addEvt()">추가</button>'
    +'</div>':'';

  el.innerHTML='<div style="padding:4px 2px 18px">'
    +'<div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:var(--b9);line-height:1.2">캘린더</div>'
    +'<div style="font-size:13px;color:var(--b5);margin-top:4px">공동체의 일정을 함께 공유해요</div></div>'
    +'<div class="card" style="margin-bottom:10px"><div class="cal-nav">'
    +'<button onclick="calPrev()">◀</button>'
    +'<h2>'+cy+'년 '+(cm+1)+'월</h2>'
    +'<button onclick="calNext()">▶</button></div></div>'
    +'<div class="card" style="margin-bottom:10px"><div class="cal-hdr">'+dh+'</div><div class="cal-grid">'+cells+'</div></div>'
    +'<button class="btn-dashed" onclick="sef=!sef;renderCalendar()">'+(sef?'닫기':'📅 일정 추가')+'</button>'+fh
    +'<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:8px">이번 달 일정</div>'+catTabs+(evtList||'<div style="font-size:13px;color:var(--b5)">없음</div>')+'</div>';
}

// 🔧 메인 캘린더 월 이동
function calPrev(){
  if(cm===0){cm=11;cy--;}else{cm--;}
  renderCalendar();
}
function calNext(){
  if(cm===11){cm=0;cy++;}else{cm++;}
  renderCalendar();
}

// 폼 상태 저장 (카테고리 바꿔도 입력값 유지)
function saveEvF(){
  const t=document.getElementById('evT');
  const d=document.getElementById('evD');
  const s=document.getElementById('evS');
  const e=document.getElementById('evE');
  const ct=document.getElementById('evCT');
  const dt=document.getElementById('evDt');
  evFD={t:t?t.value:'',d:d?d.value:'',s:s?s.value:'',e:e?e.value:'',ct:ct?ct.value:'',dt:dt?dt.value:''};
}

// ============================================================
// 일정 추가 (낙관적 업데이트)
// ============================================================
async function addEvt(){
  const t=document.getElementById('evT').value.trim();
  const d=document.getElementById('evD').value;
  const s=document.getElementById('evS').value;
  const e=document.getElementById('evE').value;
  const dt=(document.getElementById('evDt')||{}).value||'';

  if(!t){showToast('제목을 입력해주세요','error');return;}
  if(!d){showToast('날짜를 선택해주세요','error');return;}

  let ct='';
  if(selEt==='etc'){
    const c=document.getElementById('evCT');
    if(c)ct=c.value.trim();
  }

  const btn=document.getElementById('evAddBtn');
  if(btn){btn.disabled=true;btn.textContent='등록 중...';}

  // 낙관적 업데이트
  const tempId='temp_'+Date.now();
  const tempEv={id:tempId,title:t,date:d,startTime:s,endTime:e,type:selEt,detail:dt,customType:ct,_pending:true};
  AD.calendarEvents.push(tempEv);
  sef=false;
  evFD={t:'',d:'',s:'',e:'',ct:'',dt:''};
  renderCalendar();
  showToast('저장 중...');

  try{
    const r=await gas('addCalendarEvent',t,d,s,e,selEt,dt,ct,false);
    const idx=AD.calendarEvents.findIndex(function(x){return x.id===tempId;});
    if(idx>=0&&r&&r.id){
      AD.calendarEvents[idx].id=r.id;
      delete AD.calendarEvents[idx]._pending;
    }
    showToast('일정 등록 완료 ✓','success');
  }catch(err){
    AD.calendarEvents=AD.calendarEvents.filter(function(x){return x.id!==tempId;});
    sef=true;
    showToast('등록 실패','error');
    renderCalendar();
  }
}

// ============================================================
// 특정 날짜 일정 팝업
// ============================================================
function showDayEvts(ds){
  const evts=(AD.calendarEvents||[]).filter(function(e){return e.date===ds;});
  if(!evts.length){
    showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>📅 '+ds+'</h3><p style="color:var(--b5);font-size:14px;margin-top:10px">일정 없음</p>');
    return;
  }
  const items=evts.map(function(ev){
    const e=ET[ev.type]||ET.etc;
    return '<div style="border-bottom:1px solid var(--b1);padding:10px 0;cursor:pointer" onclick="closePopup();showEvtEdit(\''+ev.id+'\')">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
      +'<span style="font-size:16px">'+e.i+'</span>'
      +'<span style="font-size:15px;font-weight:700">'+escapeHtml(ev.title)+'</span></div>'
      +'<div style="font-size:13px;color:var(--b5)">'+escapeHtml(ev.startTime||'')+(ev.endTime?' ~ '+escapeHtml(ev.endTime):'')+'</div>'
      +(ev.detail?'<div style="font-size:13px;color:#4A3F35;margin-top:2px">'+escapeHtml(ev.detail)+'</div>':'')
      +'</div>';
  }).join('');
  showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>📅 '+ds+'</h3>'+items);
}

// ============================================================
// 일정 수정 팝업
// ============================================================
function showEvtEdit(id){
  const ev=(AD.calendarEvents||[]).find(function(e){return e.id===id;});
  if(!ev)return;
  const e=ET[ev.type]||ET.etc;

  const tb=Object.entries(ET).map(function(entry){
    const k=entry[0],v=entry[1];
    return '<button class="cat-tab" data-et="'+k+'" onclick="document.getElementById(\'edEvType\').value=\''+k+'\';document.querySelectorAll(\'[data-et]\').forEach(function(b){b.style.background=\'var(--b1)\';b.style.color=\'var(--b7)\';});this.style.background=\''+v.c+'\';this.style.color=\'#fff\'" style="background:'+(ev.type===k?v.c:'var(--b1)')+';color:'+(ev.type===k?'#fff':'var(--b7)')+'">'+v.i+v.l+'</button>';
  }).join('');

  showPopup('<button class="popup-close" onclick="closePopup()">✕</button>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'
    +'<span style="font-size:26px">'+e.i+'</span>'
    +'<h3 style="margin:0;font-size:18px">'+escapeHtml(ev.title)+'</h3></div>'

// 일정 수정 저장
async function saveEvtEdit(id){
  const t=document.getElementById('edEvT').value.trim();
  const d=document.getElementById('edEvD').value;
  const s=document.getElementById('edEvS').value;
  const e=document.getElementById('edEvE').value;
  const ty=document.getElementById('edEvType').value;
  const dt=document.getElementById('edEvDt').value;

  if(!t){showToast('제목을 입력해주세요','error');return;}

  const ev=AD.calendarEvents.find(function(x){return x.id===id;});
  if(!ev){closePopup();return;}

  // 낙관적 업데이트
  const backup=Object.assign({},ev);
  Object.assign(ev,{title:t,date:d,startTime:s,endTime:e,type:ty,detail:dt});
  closePopup();
  renderCalendar();
  showToast('저장 중...');

  try{
    await gas('updateCalendarEvent',id,t,d,s,e,ty,dt,'');
    showToast('저장 완료 ✓','success');
  }catch(err){
    Object.assign(ev,backup);
    showToast('저장 실패','error');
    renderCalendar();
  }
}

// 일정 삭제
async function delEvt(id){
  const backup=AD.calendarEvents.find(function(x){return x.id===id;});
  AD.calendarEvents=AD.calendarEvents.filter(function(x){return x.id!==id;});
  closePopup();
  renderCalendar();
  showToast('삭제 중...');
  try{
    await gas('deleteCalendarEvent',id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    if(backup)AD.calendarEvents.push(backup);
    showToast('삭제 실패','error');
    renderCalendar();
  }
}

// 미니 캘린더 (QT/기도 탭 안에서 사용)
// ============================================================
function renderMiniCal(type,posts){
  const ms=cy+'-'+pd(cm+1);
  const fd_=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();

  // 날짜별 글 개수
  const dateCounts={};
  posts.forEach(function(p){
    const d=p.date;
    if(d.startsWith(ms))dateCounts[d]=(dateCounts[d]||0)+1;
  });

  const dh=['일','월','화','수','목','금','토'].map(function(d){return '<div>'+d+'</div>';}).join('');

  let cells='';
  for(let i=0;i<fd_;i++)cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=ms+'-'+pd(d);
    const cnt=dateCounts[ds]||0;
    const today=ds===td();
    cells+='<div class="mc-cell'+(cnt?' has':'')+(today?' sel':'')+'" onclick="showDatePosts(\''+type+'\',\''+ds+'\')">'+d+(cnt?'<div style="font-size:8px">'+cnt+'</div>':'')+'</div>';
  }

  return '<div class="card"><div class="cal-nav">'
    +'<button onclick="miniCalPrev(\''+type+'\')">◀</button>'
    +'<h2>'+cy+'년 '+(cm+1)+'월</h2>'
    +'<button onclick="miniCalNext(\''+type+'\')">▶</button>'
    +'</div></div>'
    +'<div class="card mini-cal"><div class="mc-hdr">'+dh+'</div><div class="mc-grid">'+cells+'</div></div>';
}

// 🔧 🐛 BUG FIX: 원래 코드는 prev/next 둘 다 cm++ 였음 → 이전달 이동 안 됨
function miniCalPrev(type){
  if(cm===0){cm=11;cy--;}else{cm--;}
  if(type==='qt')renderQt();else renderPrayer();
}
function miniCalNext(type){
  if(cm===11){cm=0;cy++;}else{cm++;}
  if(type==='qt')renderQt();else renderPrayer();
}

// 특정 날짜의 글 팝업
async function showDatePosts(type,date){
  showToast('불러오는 중...');
  try{
    const r=type==='qt'
      ?await gas('getQTPosts','all',0,100)
      :await gas('getPrayerPosts','all',0,100);
    const filtered=r.posts.filter(function(p){return p.date===date;});
    hideToast();

    if(!filtered.length){
      showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>📅 '+date+'</h3><p style="color:var(--b5);margin-top:10px">이 날 작성된 글이 없어요</p>');
      return;
    }

    const items=filtered.map(function(p){
      const m=gm(p.authorId);
      if(type==='qt'){
        return '<div style="border-bottom:1px solid var(--b1);padding:10px 0">'
          +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
          +'<div class="avatar" style="width:28px;height:28px;font-size:12px">'+m.emoji+'</div>'
          +'<span style="font-weight:700">'+escapeHtml(m.name)+'</span></div>'
          +'<div style="font-size:13px;color:var(--gold);margin-bottom:4px">📜 '+escapeHtml(p.book)+' '+escapeHtml(p.chFrom)+':'+escapeHtml(p.vsFrom)+'</div>'
          +(p.bestVerse?'<div style="font-size:13px;color:#4A3F35">'+escapeHtml(p.bestVerse)+'</div>':'')
          +(p.shareContent?'<div style="font-size:13px;color:#4A3F35;margin-top:2px">'+escapeHtml(p.shareContent)+'</div>':'')
          +'</div>';
      }else{
        const isPr2=(p.postType||'prayer')==='prayer';
        return '<div style="border-bottom:1px solid var(--b1);padding:10px 0">'
          +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
          +'<div class="avatar" style="width:28px;height:28px;font-size:12px">'+m.emoji+'</div>'
          +'<span style="font-weight:700">'+escapeHtml(m.name)+'</span>'
          +'<span style="font-size:11px;padding:2px 6px;border-radius:6px;background:'+(isPr2?'var(--purple)':'var(--gold)')+';color:#fff">'+(isPr2?'기도':'감사')+'</span></div>'
          +'<div style="font-size:14px;color:#4A3F35">'+escapeHtml(p.situation)+'</div>'
          +'</div>';
      }
    }).join('');

    showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>📅 '+date+'</h3>'+items);
  }catch(e){
    hideToast();
    showToast('불러오기 실패','error');
  }
}

async function saveProfile(){
  const e=document.getElementById('edE').value;
  const b=document.getElementById('edB').value.trim();
  const p=document.getElementById('edP').value;

  const btn=document.getElementById('saveProfileBtn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  // 낙관적 업데이트: 즉시 프로필 반영
  const backupEmoji=CU.emoji;
  const backupBio=CU.bio;
  CU.emoji=e;
  CU.bio=b;
  document.getElementById('profileBtn').textContent=e;

  try{
    await gas('updateProfile',CU.id,e,b,p||null);

    // 비밀번호 바뀌었으면 localStorage 업데이트
    if(p){
      const s=localStorage.getItem('yeorin_user');
      if(s){
        try{
          const d=JSON.parse(s);
          d.pw=p;
          localStorage.setItem('yeorin_user',JSON.stringify(d));
        }catch(err){}
      }
    }

    showToast('저장 완료 ✓','success');
    closePopup();
    renderMyPage();
  }catch(err){
    // 실패 시 복구
    CU.emoji=backupEmoji;
    CU.bio=backupBio;
    document.getElementById('profileBtn').textContent=backupEmoji;
    if(btn){btn.disabled=false;btn.textContent='저장';}
    showToast('저장 실패, 다시 시도해주세요','error');
  }
}

function renderWorshipDetail(){
  const el=document.getElementById('page-worship');
  const list=(worshipsData.list||[]);
  const w=list.find(function(x){return x.id===selWorshipId;});
  if(!w){backToWorshipList();return;}

  const idx=list.findIndex(function(x){return x.id===selWorshipId;});
  const prevW=idx<list.length-1?list[idx+1]:null;  // 더 오래된
  const nextW=idx>0?list[idx-1]:null;              // 더 최근

  const d=w.date.split('-');
  const badge=w.type==='zoom'?'💻 Zoom':'🏠 현장';

  let html='<button class="back-btn" onclick="backToWorshipList()">← 예배 목록</button>';

  // 히어로
  html+='<div class="worship-hero">'
    +'<div class="wh-top">'
    +'<div class="wh-date">'+d[0]+'.'+d[1]+'.'+d[2]+' · 주일</div>'
    +'<button class="wh-settings" onclick="showWorshipSettings(\''+w.id+'\')">⚙️</button></div>'
    +'<div class="wh-title">'+escapeHtml(w.messageTitle||'예배 기록')+'</div>'
    +'<div class="wh-sub">'+badge+(w.messageRef?' · '+escapeHtml(w.messageRef):'')+'</div>'
    +'</div>';

  // Zoom 버튼
  if(w.type==='zoom'&&w.zoomUrl){
    html+='<a href="'+escapeHtml(w.zoomUrl)+'" target="_blank" style="text-decoration:none"><button class="zoom-join">💻 Zoom 예배 참여하기</button></a>';
  }

  // 서브탭
  html+='<div class="sub-tabs" style="margin-bottom:14px">'
    +'<button class="sub-tab'+(worshipSub==='song'?' active':'')+'" onclick="worshipSub=\'song\';renderWorship()">🎵 찬양</button>'
    +'<button class="sub-tab'+(worshipSub==='message'?' active':'')+'" onclick="worshipSub=\'message\';renderWorship()">📖 말씀</button>'
    +'<button class="sub-tab'+(worshipSub==='share'?' active':'')+'" onclick="worshipSub=\'share\';renderWorship()">💬 나눔</button>'
    +'</div>';

  if(worshipSub==='song')html+=renderWorshipSongs(w);
  else if(worshipSub==='message')html+=renderWorshipMessage(w);
  else if(worshipSub==='share')html+=renderWorshipShares(w);

  // 이전/다음 네비게이션
  html+='<div class="worship-nav">'
    +(prevW
      ?'<button class="w-nav-btn" onclick="openWorship(\''+prevW.id+'\')">'
        +'<div class="w-nav-label">← 이전 예배</div>'
        +'<div class="w-nav-date">'+prevW.date.split('-').slice(1).join('/')+'</div>'
        +'<div class="w-nav-title">'+escapeHtml(prevW.messageTitle||'예배 기록')+'</div></button>'
      :'<div class="w-nav-empty"></div>')
    +(nextW
      ?'<button class="w-nav-btn w-nav-right" onclick="openWorship(\''+nextW.id+'\')">'
        +'<div class="w-nav-label">다음 예배 →</div>'
        +'<div class="w-nav-date">'+nextW.date.split('-').slice(1).join('/')+'</div>'
        +'<div class="w-nav-title">'+escapeHtml(nextW.messageTitle||'예배 기록')+'</div></button>'
      :'<div class="w-nav-empty"></div>')
    +'</div>';

  el.innerHTML=html;
}

function renderWorshipSongs(w){
  const songs=(worshipsData.songs||[]).filter(function(s){return s.worshipId===w.id;}).sort(function(a,b){return a.order-b.order;});
  let html='';
  if(songs.length===0){
    html='<div class="card" style="text-align:center;padding:30px 20px;color:var(--b5)">'
      +'<div style="font-size:32px;margin-bottom:8px">🎵</div>'
      +'<div style="font-size:13px">아직 찬양이 없어요</div></div>';
  }else{
    html='<div class="song-grid">';
    songs.forEach(function(s){
      const thumb=getYoutubeThumb(s.url);
      const pending=s._pending;
      html+='<div class="song-card" style="'+(pending?'opacity:.6':'')+'">'
        +'<a href="'+escapeHtml(s.url)+'" target="_blank" class="song-link">'
        +'<div class="song-thumb"'+(thumb?' style="background-image:url('+escapeHtml(thumb)+')"':'')+'><div class="song-play">▶</div></div>'
        +'<div class="song-info">'
        +'<div class="song-title">'+escapeHtml(s.title)+'</div>'
        +(s.artist?'<div class="song-artist">🎤 '+escapeHtml(s.artist)+'</div>':'')
        +'</div></a>'
        +(pending?'':'<button class="song-menu" onclick="event.preventDefault();event.stopPropagation();toggleSongMenu(\''+s.id+'\')">⋯</button>'
        +'<div class="song-menu-drop" id="sm-'+s.id+'">'
        +'<button onclick="showEditSong(\''+s.id+'\')">✏️ 수정</button>'
        +'<button onclick="removeSong(\''+s.id+'\')">🗑 삭제</button>'
        +'</div>')
        +'</div>';
    });
    html+='</div>';
  }
  html+='<button class="btn-dashed" onclick="showAddSong(\''+w.id+'\')">+ 찬양 추가</button>';
  return html;
}

async function createWorship(){
  const date=document.getElementById('nwDate').value;
  if(!date){showToast('날짜를 선택해주세요','error');return;}
  const zoomUrl=_newWType==='zoom'?document.getElementById('nwZoom').value.trim():'';

  const btn=document.getElementById('wCreateBtn');
  if(btn){btn.disabled=true;btn.textContent='생성 중...';}

  showToast('생성 중...');
  try{

function updateNoticeDot(){
  const notices=AD&&AD.notices?AD.notices:[];
  const lastRead=localStorage.getItem('yeorin_notice_read')||'2000-01-01';
  const hasNew=notices.some(function(n){return n.date>lastRead;});
  const dot=document.getElementById('noticeDot');
  if(dot)dot.style.display=hasNew?'block':'none';
}

function showNoticeList(){
  localStorage.setItem('yeorin_notice_read',td());
  const dot=document.getElementById('noticeDot');
  if(dot)dot.style.display='none';

  const notices=AD&&AD.notices?AD.notices:[];
  let items='';
  if(!notices.length){
    items='<div style="text-align:center;padding:24px;color:var(--b5)">공지사항이 없어요</div>';
  }else{
    items=notices.map(function(n){
      const m=gm(n.authorId);
      const own=n.authorId===CU.id;
      const pin=n.pinned==='Y';
      return '<div style="border-bottom:1px solid var(--b1);padding:14px 0">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div style="flex:1">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        +(pin?'<span style="font-size:11px;padding:2px 8px;border-radius:6px;background:var(--coral);color:#fff;font-weight:600">📌 고정</span>':'')
        +'<span style="font-size:15px;font-weight:700">'+escapeHtml(n.title)+'</span>'
        +'</div>'
        +'<div style="font-size:14px;color:#4A3F35;line-height:1.6;margin-bottom:4px">'+escapeHtml(n.content).replace(/\n/g,'<br>')+'</div>'
        +'<div style="font-size:11px;color:var(--b5)">'+m.emoji+' '+escapeHtml(m.name)+' · '+escapeHtml(n.date)+'</div>'
        +'</div>'

// 공지 작성 (낙관적)
async function submitNotice(){
  const t=document.getElementById('ntTitle').value.trim();
  const c=document.getElementById('ntContent').value.trim();
  const p=document.getElementById('ntPinned').checked;
  if(!t){showToast('제목을 입력해주세요','error');return;}
  if(!c){showToast('내용을 입력해주세요','error');return;}

  const btn=document.getElementById('ntSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  // 낙관적 업데이트
  if(!AD.notices)AD.notices=[];
  const tempId='temp_'+Date.now();
  const tempNotice={
    id:tempId,authorId:CU.id,title:t,content:c,date:td(),
    pinned:p?'Y':'',_pending:true
  };
  // 고정은 맨 위, 아니면 날짜 최신순
  AD.notices.unshift(tempNotice);
  AD.notices.sort(function(a,b){
    if(a.pinned==='Y'&&b.pinned!=='Y')return -1;
    if(b.pinned==='Y'&&a.pinned!=='Y')return 1;
    return S(b.date).localeCompare(S(a.date));
  });
  closePopup();
  showToast('저장 중...');

  try{
    const r=await gas('addNotice',CU.id,t,c,p);
    const idx=AD.notices.findIndex(function(n){return n.id===tempId;});
    if(idx>=0&&r&&r.id){AD.notices[idx].id=r.id;delete AD.notices[idx]._pending;}
    showToast('공지 등록 완료 ✓','success');
    showNoticeList();
  }catch(e){
    AD.notices=AD.notices.filter(function(n){return n.id!==tempId;});
    showToast('저장 실패','error');
    showNoticeList();
  }
}

function editNotice(nid){
  const n=(AD.notices||[]).find(function(x){return x.id===nid;});
  if(!n)return;
  closePopup();
  setTimeout(function(){showNoticeForm(n);},200);
}

// 공지 수정 (낙관적)
async function saveNoticeEdit(nid){
  const t=document.getElementById('ntTitle').value.trim();
  const c=document.getElementById('ntContent').value.trim();
  const p=document.getElementById('ntPinned').checked;
  if(!t){showToast('제목을 입력해주세요','error');return;}
  if(!c){showToast('내용을 입력해주세요','error');return;}

  const n=AD.notices.find(function(x){return x.id===nid;});
  if(!n){closePopup();return;}

  // 낙관적 업데이트
  const backup={title:n.title,content:n.content,pinned:n.pinned};
  n.title=t;n.content=c;n.pinned=p?'Y':'';
  // 고정 상태 바뀌었을 수 있으니 재정렬
  AD.notices.sort(function(a,b){
    if(a.pinned==='Y'&&b.pinned!=='Y')return -1;
    if(b.pinned==='Y'&&a.pinned!=='Y')return 1;
    return S(b.date).localeCompare(S(a.date));
  });
  closePopup();
  showToast('저장 중...');

  try{
    await gas('updateNotice',nid,CU.id,t,c,p);
    showToast('수정 완료 ✓','success');
    showNoticeList();
  }catch(e){
    n.title=backup.title;n.content=backup.content;n.pinned=backup.pinned;
    showToast('수정 실패','error');
    showNoticeList();
  }
}

// 공지 삭제 (낙관적)
async function delNotice(nid){
  if(!confirm('이 공지를 삭제하시겠습니까?'))return;
  const backup=(AD.notices||[]).find(function(x){return x.id===nid;});
  AD.notices=(AD.notices||[]).filter(function(x){return x.id!==nid;});
  closePopup();
  showToast('삭제 중...');
  try{
    await gas('deleteNotice',nid,CU.id);
    showToast('삭제 완료 ✓','success');
    showNoticeList();
  }catch(e){
    if(backup)AD.notices.push(backup);
    showToast('삭제 실패','error');
    showNoticeList();
  }
}

// ============================================================
// 여린이 AI - 로딩 메시지 순환
// ============================================================
let _yeorinLoadingTimer=null;

function startYeorinLoading(el,messages,style){
  let idx=0;
  function show(){
    const msg=messages[idx];
    if(style==='inline'){
      el.innerHTML='<div style="padding:10px;text-align:center">'
        +'<div class="spinner" style="margin:0 auto;width:20px;height:20px;border-width:2px"></div>'
        +'<div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:600;transition:opacity .3s">'+escapeHtml(msg)+'</div>'
        +'</div>';
    }else{
      el.innerHTML='<div class="card" style="border-left:4px solid var(--green)">'
        +'<div style="text-align:center;padding:8px 0">'
        +'<img class="yeorin-img-lg" src="'+YIMG+'" style="height:40px;animation:pulse 1.5s infinite">'
        +'<div style="font-size:14px;font-weight:700;color:var(--green);margin-top:10px;transition:opacity .3s">'+escapeHtml(msg)+'</div>'
        +'<div class="spinner" style="margin:12px auto 4px;width:22px;height:22px;border-width:2px"></div>'
        +'</div></div>';
    }
    idx=(idx+1)%messages.length;
  }
  show();
  _yeorinLoadingTimer=setInterval(show,1800);
}

function stopYeorinLoading(){
  if(_yeorinLoadingTimer){
    clearInterval(_yeorinLoadingTimer);
    _yeorinLoadingTimer=null;
  }
}
