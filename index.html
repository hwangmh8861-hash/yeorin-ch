.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}.popup{background:#fff;border-radius:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.15);position:relative;}.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:none;background:var(--b1);font-size:15px;display:flex;align-items:center;justify-content:center;}.popup h3{font-size:17px;font-weight:700;margin-bottom:14px;}

// 🚀 CHANGED: 공감 — 실패 시 복구 로직 추가
async function togRx(type,id,key){
  var arr=type==='qt'?qtPosts:prPosts;
  var it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;

  // 원래 상태 백업 (실패 시 복구용)
  var wasActive=it.reactions[key]&&it.reactions[key].includes(CU.id);

  // 낙관적 업데이트: 화면 먼저 반영
  if(!it.reactions[key])it.reactions[key]=[];
  var idx=it.reactions[key].indexOf(CU.id);
  if(idx>-1)it.reactions[key].splice(idx,1);
  else it.reactions[key].push(CU.id);
  type==='qt'?renderQt():renderPrayer();

  // 서버 저장
  try{
    await gas('toggleReaction',type,id,key,CU.id);
  }catch(e){
    // 실패 시 원복
    var idx2=it.reactions[key].indexOf(CU.id);
    if(wasActive){
      if(idx2===-1)it.reactions[key].push(CU.id);
    }else{
      if(idx2>-1)it.reactions[key].splice(idx2,1);
    }
    type==='qt'?renderQt():renderPrayer();
    showToast('공감 저장 실패, 다시 시도해주세요','error');
  }
}

// 🚀 CHANGED: 댓글 추가 — 실패 시 복구
async function addCm(type,id){
  if(busy)return;
  var inp=document.getElementById('ci-'+type+'-'+id);
  if(!inp||!inp.value.trim())return;
  var t=inp.value.trim();
  var arr=type==='qt'?qtPosts:prPosts;
  var it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;

  // 낙관적 업데이트 (임시 ID)
  var tempId='t'+Date.now();
  if(!it.comments)it.comments=[];
  var tempCmt={id:tempId,a:CU.id,t:t,d:td()};
  it.comments.push(tempCmt);
  inp.value='';
  type==='qt'?renderQt():renderPrayer();

  // 서버 저장
  try{
    var res=await gas('addComment',type,id,CU.id,t);
    // 성공 시 임시 ID를 실제 ID로 교체
    if(res&&res.id){
      var cmt=it.comments.find(function(c){return c.id===tempId;});
      if(cmt)cmt.id=res.id;
    }
  }catch(e){
    // 실패 시 임시 댓글 제거
    it.comments=it.comments.filter(function(c){return c.id!==tempId;});
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 저장 실패, 다시 시도해주세요','error');
  }
}

// 🚀 CHANGED: 댓글 삭제 — 실패 시 복구
async function delCm(cid,type){
  var arr=type==='qt'?qtPosts:prPosts;
  // 원래 상태 백업
  var backup=[];
  arr.forEach(function(p){if(p.comments){p.comments.forEach(function(c){if(c.id===cid)backup.push({postId:p.id,cmt:JSON.parse(JSON.stringify(c))});});}});

  // 낙관적 삭제
  arr.forEach(function(p){if(p.comments)p.comments=p.comments.filter(function(c){return c.id!==cid;});});
  type==='qt'?renderQt():renderPrayer();

  try{
    await gas('deleteComment',cid,CU.id);
  }catch(e){
    // 실패 시 복구
    backup.forEach(function(b){
      var p=arr.find(function(x){return x.id===b.postId;});
      if(p){if(!p.comments)p.comments=[];p.comments.push(b.cmt);}
    });
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 삭제 실패, 다시 시도해주세요','error');
  }
}

// 🚀 CHANGED: 성경 체크 — 즉시 저장 + 실패 시 복구 + 중복 클릭 방지
async function toggleCh(bi,ch){
  var k=bi+'-'+ch;
  // 이미 저장 중이면 무시 (중복 클릭 방지)
  if(savingChapters[k])return;

  var bp=AD.myBibleProgress,abp=AD.allBibleProgress;
  var wasChecked=bp.indexOf(k)>-1;

  // 낙관적 업데이트: 화면 먼저 반영
  if(wasChecked){
    var idxs=[];bp.forEach(function(v,i){if(v===k)idxs.push(i);});
    for(var i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
    if(abp[CU.id]){var ai=[];abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});for(var i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);}
  }else{
    bp.push(k);
    if(!abp[CU.id])abp[CU.id]=[];
    abp[CU.id].push(k);
  }
  savingChapters[k]=true;
  showToast('저장 중...');
  renderBible();

  // 서버 저장
  try{
    await gas('toggleBibleChapter',CU.id,k);
    delete savingChapters[k];
    showToast('저장됨','success');
    renderBible();
  }catch(e){
    // 실패 시 복구
    delete savingChapters[k];
    if(wasChecked){
      // 원래 체크되어 있던 것 → 다시 추가
      bp.push(k);
      if(!abp[CU.id])abp[CU.id]=[];
      abp[CU.id].push(k);
    }else{
      // 원래 체크 안 되어 있던 것 → 제거
      var idxs=[];bp.forEach(function(v,i){if(v===k)idxs.push(i);});
      for(var i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
      if(abp[CU.id]){var ai=[];abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});for(var i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);}
    }
    showToast('저장 실패, 다시 시도해주세요','error');
    renderBible();
  }
}

// 시간 전 표시 ("방금", "3분 전", "2시간 전", "어제", "4/12")
function timeAgo(ts){
  if(!ts)return'';
  var t=new Date(String(ts).replace(' ','T')).getTime();
  if(isNaN(t))return'';
  var diff=Date.now()-t;
  var min=Math.floor(diff/60000);
  if(min<1)return'방금';
  if(min<60)return min+'분 전';
  var hr=Math.floor(min/60);
  if(hr<24)return hr+'시간 전';
  var d=Math.floor(hr/24);
  if(d<2)return'어제';
  if(d<7)return d+'일 전';
  var dd=new Date(t);
  return(dd.getMonth()+1)+'/'+dd.getDate();
}

function getYoutubeId(url){
  if(!url)return'';
  var m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#]+)/);
  return m?m[1]:'';
}
function getYoutubeThumb(url){
  var id=getYoutubeId(url);
  return id?'https://img.youtube.com/vi/'+id+'/mqdefault.jpg':'';

// 🚀 NEW: 로딩 메시지 순환 시스템
var yeorinLoadingTimer=null;
function startYeorinLoading(el,messages,style){
  var idx=0;
  function show(){
    var msg=messages[idx];
    if(style==='inline'){
      el.innerHTML='<div style="padding:10px;text-align:center"><div class="spinner" style="margin:0 auto;width:20px;height:20px;border-width:2px"></div><div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:600;transition:opacity .3s">'+msg+'</div></div>';
    }else{
      el.innerHTML='<div class="card" style="border-left:4px solid var(--green)"><div style="text-align:center;padding:8px 0"><img class="yeorin-img-lg" src="'+YIMG+'" style="height:40px;animation:pulse 1.5s infinite"><div style="font-size:14px;font-weight:700;color:var(--green);margin-top:10px;transition:opacity .3s">'+msg+'</div><div class="spinner" style="margin:12px auto 4px;width:22px;height:22px;border-width:2px"></div></div></div>';
    }
    idx=(idx+1)%messages.length;
  }
  show();
  yeorinLoadingTimer=setInterval(show,1800);
}
function stopYeorinLoading(){
  if(yeorinLoadingTimer){clearInterval(yeorinLoadingTimer);yeorinLoadingTimer=null;}
}

async function askYeorinBibleUI(bookName){
  var ch=prompt(bookName+' 몇 장이 궁금하세요? (숫자만 입력)');

  var el=document.getElementById('yeorinBible');
  var messages=[

    '✨ 이 장의 배경을 살펴보고 있어요',
    '💡 핵심 구절을 찾고 있어요',
    '🌿 따뜻하게 정리하고 있어요',
    '🕊️ 마지막으로 다듬는 중이에요'
  ];
  startYeorinLoading(el,messages,'card');

    var res=await gas('askYeorinBible',bookName,parseInt(ch));

    stopYeorinLoading();
