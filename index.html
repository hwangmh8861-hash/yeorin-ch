<style>
:root{--bg:#FAF6F0;--card:#fff;--b9:#3E2723;--b7:#5C4033;--b5:#8B7E74;--b3:#D4CBB8;--b1:#F0EBE3;--b0:#FAF8F5;--gold:#C4A26E;--green:#7BAF7B;--purple:#9080C0;--coral:#C07050;--blue:#7B8FC0;--shadow:0 2px 12px rgba(92,64,51,.06);--r:16px;--max:640px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Pretendard Variable','Noto Sans KR',sans-serif;background:linear-gradient(180deg,var(--bg),#F0EBE3);min-height:100vh;color:var(--b9);-webkit-tap-highlight-color:transparent;font-size:16px;line-height:1.6;overflow-x:hidden;}button{font-family:inherit;cursor:pointer;}input,textarea,select{font-family:inherit;}
.onboarding{position:fixed;inset:0;z-index:1000;background:var(--bg);}.ob-slides{display:flex;width:400%;height:100%;transition:transform .4s;}.ob-slide{width:25%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}.ob-icon{font-size:56px;margin-bottom:16px;}.ob-title{font-size:20px;font-weight:800;color:var(--b7);margin-bottom:8px;}.ob-desc{font-size:14px;color:var(--b5);line-height:1.7;max-width:300px;}.ob-dots{display:flex;gap:8px;margin-top:28px;}.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--b3);transition:.3s;}.ob-dot.active{background:var(--b7);width:24px;border-radius:4px;}.ob-btns{margin-top:20px;display:flex;gap:12px;}.ob-btn{padding:11px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;}.ob-skip{background:0;color:var(--b5);}.ob-next{background:var(--b7);color:#FAF0E6;}.ob-start{background:var(--gold);color:#fff;padding:14px 44px;font-size:15px;}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.auth-box{background:var(--card);border-radius:24px;padding:28px 22px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(92,64,51,.1);text-align:center;}.auth-box h1{font-size:18px;font-weight:800;color:var(--b7);margin-bottom:2px;}.auth-box .sub{font-size:11px;color:var(--b5);margin-bottom:16px;}.auth-toggle{font-size:12px;color:var(--b5);margin-top:14px;}.auth-toggle a{color:var(--b7);font-weight:700;cursor:pointer;text-decoration:none;}.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:10px;}.emoji-opt{width:40px;height:40px;border-radius:50%;border:3px solid var(--b1);background:var(--b0);font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s;}.emoji-opt.sel{border-color:var(--b7);background:var(--b1);transform:scale(1.1);}.error-msg{color:var(--coral);font-size:11px;margin-top:4px;min-height:14px;}
.app{display:none;}.top-bar{background:linear-gradient(135deg,var(--b7),var(--b9));padding:16px 20px;color:#FAF0E6;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}.top-bar-left{display:flex;align-items:center;gap:10px;}.profile-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);font-size:18px;display:flex;align-items:center;justify-content:center;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid #E8E0D8;z-index:200;padding:0 0 env(safe-area-inset-bottom,4px);}.bottom-inner{display:flex;max-width:var(--max);margin:0 auto;}.btab{flex:1;padding:10px 0;border:none;background:none;font-size:13px;color:var(--b5);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;transition:.15s;}.btab.active{color:var(--b7);font-weight:700;}.btab .bico{font-size:26px;line-height:1;}.badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--coral);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.content{max-width:var(--max);margin:0 auto;padding:14px 16px 100px;}.page{display:none;animation:fadeUp .2s;}.page.active{display:block;}@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}.btn-primary{padding:12px 26px;border-radius:12px;border:none;background:var(--b7);color:#FAF0E6;font-size:15px;font-weight:600;}.btn-primary:disabled{opacity:.5;}.btn-full{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;}.btn-sm{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;}.btn-dashed{width:100%;padding:14px;border-radius:14px;border:2px dashed var(--b3);background:0;color:var(--b7);font-size:15px;font-weight:600;margin-bottom:14px;}.btn-pill{padding:7px 16px;border-radius:20px;border:none;font-size:13px;font-weight:600;transition:.15s;}.btn-more{width:100%;padding:13px;border-radius:10px;border:1px solid var(--b3);background:var(--b0);color:var(--b5);font-size:14px;font-weight:600;margin-top:10px;}.input-field{width:100%;padding:13px;border-radius:10px;border:1px solid #E8E0D8;font-size:15px;outline:none;background:var(--b0);}.select-field{width:100%;padding:13px;border-radius:10px;border:1px solid #E8E0D8;font-size:15px;outline:none;background:var(--b0);cursor:pointer;appearance:none;}.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--b1);}.fg{margin-bottom:14px;}.q-label{font-size:14px;font-weight:600;color:var(--b7);margin-bottom:5px;display:block;}

.reaction-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:12px;}.react-btn{padding:6px 13px;border-radius:18px;border:1px solid var(--b1);background:#fff;font-size:14px;transition:.15s;display:flex;align-items:center;gap:3px;}.react-btn.active{border-color:var(--b7);background:var(--b1);}.react-btn .cnt{font-size:12px;font-weight:700;color:var(--b5);}.rx-names{font-size:12px;color:var(--b5);margin-top:6px;line-height:1.5;}
.comment-section{margin-top:12px;border-top:1px solid var(--b1);padding-top:10px;}.c-item{display:flex;gap:7px;margin-bottom:6px;}.c-av{width:26px;height:26px;border-radius:50%;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}.c-body{font-size:13px;color:#4A3F35;line-height:1.5;}.c-name{font-weight:700;margin-right:3px;}.c-date{font-size:11px;color:var(--b5);margin-left:4px;}.c-del{border:none;background:none;color:var(--b5);font-size:11px;margin-left:3px;text-decoration:underline;}.c-input-row{display:flex;gap:6px;margin-top:6px;}.c-input-row input{flex:1;padding:8px 14px;border-radius:18px;border:1px solid #E8E0D8;font-size:13px;outline:none;background:var(--b0);}.c-input-row button{padding:8px 16px;border-radius:18px;border:none;background:var(--b7);color:#FAF0E6;font-size:12px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}.popup{background:#fff;border-radius:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.15);position:relative;}.popup-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:none;background:var(--b1);font-size:15px;display:flex;align-items:center;justify-content:center;}.popup h3{font-size:17px;font-weight:700;margin-bottom:14px;}
.loading{text-align:center;padding:36px;color:var(--b5);font-size:14px;}.spinner{width:32px;height:32px;border:3px solid var(--b1);border-top-color:var(--b7);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px;}@keyframes spin{to{transform:rotate(360deg)}}.submit-overlay{position:fixed;inset:0;background:rgba(250,246,240,.85);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;}.submit-overlay .spinner{width:40px;height:40px;}.submit-overlay p{font-size:15px;color:var(--b7);font-weight:600;margin-top:10px;}
.progress-bar-bg{background:var(--b1);border-radius:8px;height:10px;overflow:hidden;}.progress-bar-fill{height:100%;border-radius:8px;transition:width .4s;}.cat-label{font-size:14px;font-weight:700;margin-bottom:6px;padding:0 4px;}.book-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}.book-tile{padding:8px 10px;border-radius:8px;border:none;font-size:13px;position:relative;overflow:hidden;transition:.2s;outline:none;}.book-tile .micro-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:2px;}.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:5px;}.ch-btn{aspect-ratio:1;border-radius:8px;border:none;font-size:14px;transition:.2s;width:100%;outline:none;position:relative;}.ch-btn.saving::after{content:'';position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1s infinite;}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}.back-btn{background:none;border:none;color:var(--b7);font-size:15px;font-weight:600;margin-bottom:12px;padding:0;}
/* 🚀 NEW: 작은 저장 상태 표시 (화면 안 가림) */
.save-toast{position:fixed;bottom:80px;right:16px;background:rgba(62,39,35,.9);color:#fff;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;display:flex;align-items:center;gap:6px;transition:opacity .3s;pointer-events:none;}
.save-toast .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1s infinite;}
.save-toast.success .dot{background:var(--green);animation:none;}
.save-toast.error{background:var(--coral);}
.sub-tabs{display:flex;background:var(--b1);border-radius:12px;padding:4px;margin-bottom:14px;}.sub-tab{flex:1;padding:10px 6px;border:none;border-radius:10px;background:0;font-size:14px;font-weight:500;color:var(--b5);transition:.2s;text-align:center;}.sub-tab.active{background:var(--card);color:var(--b7);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.accordion-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 0;font-size:15px;font-weight:700;}.accordion-body{overflow:hidden;max-height:0;transition:max-height .3s;}.accordion-body.open{max-height:800px;}.member-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);cursor:pointer;}.member-row:last-child{border-bottom:none;}
.ch-card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--gold);cursor:pointer;}.ch-meta{font-size:13px;color:var(--b5);margin-bottom:6px;}.ch-members{display:flex;align-items:center;margin-bottom:6px;}.ch-member-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #fff;margin-left:-5px;background:var(--b1);}.ch-member-av:first-child{margin-left:0;}.ch-progress{display:flex;align-items:center;gap:7px;margin-bottom:4px;}.ch-progress .pname{font-size:13px;font-weight:600;min-width:52px;}.ch-progress .pct{font-size:12px;font-weight:700;color:var(--b5);min-width:34px;text-align:right;}
.cert-log{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;}.cert-dot{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
.qt-section{margin-bottom:8px;padding:12px 14px;border-radius:10px;background:var(--b0);font-size:14px;line-height:1.6;color:#4A3F35;}.qt-section-label{font-size:12px;font-weight:700;color:var(--b5);margin-bottom:3px;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;}.cal-nav button{background:none;border:none;font-size:22px;color:var(--b7);}.cal-nav h2{font-size:18px;font-weight:700;}.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}.cal-hdr div{text-align:center;font-size:14px;font-weight:600;padding:5px;}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}.cal-cell{padding:4px 3px;min-height:76px;border-radius:6px;border:1px solid var(--b1);cursor:pointer;}.cal-cell.today{background:rgba(92,64,51,.06);border:2px solid var(--b7);}.cal-day{font-size:14px;text-align:center;margin-bottom:2px;font-weight:500;}.cal-ev{font-size:11px;padding:2px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;}.evt-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b1);cursor:pointer;}.evt-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}.cat-tab{padding:7px 14px;border-radius:18px;border:none;font-size:13px;font-weight:600;transition:.15s;}
.edit-menu-btn{background:none;border:none;font-size:20px;color:var(--b5);padding:4px 6px;}.edit-dropdown{position:absolute;right:8px;top:40px;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);overflow:hidden;z-index:50;}.edit-dropdown button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;}.edit-dropdown button:hover{background:var(--b1);}
.my-header{text-align:center;padding:24px 0;}.my-avatar{width:72px;height:72px;border-radius:50%;background:var(--b1);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 10px;}.my-name{font-size:22px;font-weight:800;}.my-bio{font-size:14px;color:var(--b5);margin-top:3px;}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;}.stat-item{text-align:center;padding:12px 4px;background:var(--b0);border-radius:12px;}.stat-num{font-size:22px;font-weight:800;color:var(--b7);}.stat-label{font-size:11px;color:var(--b5);margin-top:2px;}.my-menu-item{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--b1);font-size:16px;font-weight:500;cursor:pointer;}.my-menu-item:last-child{border-bottom:none;}.my-menu-item .mi-icon{font-size:20px;width:28px;text-align:center;}
.mini-cal{margin-bottom:14px;}.mini-cal .mc-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}.mini-cal .mc-hdr div{text-align:center;font-size:11px;font-weight:600;color:var(--b5);padding:3px;}.mini-cal .mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}.mini-cal .mc-cell{text-align:center;padding:6px 2px;font-size:12px;border-radius:4px;cursor:pointer;}.mini-cal .mc-cell.has{background:var(--gold);color:#fff;font-weight:700;}.mini-cal .mc-cell.sel{border:2px solid var(--b7);}
.yeorin-img{height:22px;vertical-align:middle;border-radius:50%;margin-right:4px;}.yeorin-img-lg{height:28px;border-radius:50%;margin-right:6px;}
/* 🚀 스켈레톤 UI */
.sk-box{background:linear-gradient(90deg,#EFEBE4 0%,#F7F4EE 50%,#EFEBE4 100%);background-size:200% 100%;animation:sk-shimmer 1.4s infinite;border-radius:4px;}
@keyframes sk-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.verse-card{background:linear-gradient(135deg,#FAF6F0 0%,#F0EBE3 100%);border-radius:var(--r);border:1px solid #E8E0D8;padding:20px 18px;text-align:center;margin-bottom:14px;animation:fadeIn .4s;}
.verse-label{font-size:11px;font-weight:700;color:#8B7E74;letter-spacing:1px;margin-bottom:10px;}
.verse-text{font-size:15px;font-weight:500;line-height:1.7;color:#3E2723;margin-bottom:8px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

function gas(fn,...a){
  // Vercel 모드: fetch로 GAS API 호출
  return fetch(window.GAS_URL,{
    method:'POST',
    // GAS는 CORS 프리플라이트를 지원 안 해서 text/plain으로 보내야 함
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({fn:fn,args:a})
  }).then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.json();
  }).then(function(r){
    if(r.error)throw new Error(r.error);
    return r.data;
  });
}

// 🚀 CHANGED: 공감 — 실패 시 복구 로직 추가
async function togRx(type,id,key){
  var arr=type==='qt'?qtPosts:prPosts;
  var it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;

  // 원래 상태 백업 (실패 시 복구용)
  var wasActive=it.reactions[key]&&it.reactions[key].includes(CU.id);

  // 낙관적 업데이트: 화면 먼저 반영
  if(!it.reactions[key])it.reactions[key]=[];
  var idx=it.reactions[key].indexOf(CU.id);
  if(idx>-1)it.reactions[key].splice(idx,1);
  else it.reactions[key].push(CU.id);
  type==='qt'?renderQt():renderPrayer();

  // 서버 저장
  try{
    await gas('toggleReaction',type,id,key,CU.id);
  }catch(e){
    // 실패 시 원복
    var idx2=it.reactions[key].indexOf(CU.id);
    if(wasActive){
      if(idx2===-1)it.reactions[key].push(CU.id);
    }else{
      if(idx2>-1)it.reactions[key].splice(idx2,1);
    }
    type==='qt'?renderQt():renderPrayer();
    showToast('공감 저장 실패, 다시 시도해주세요','error');
  }
}

async function addCm(type,id){
  if(busy)return;
  var inp=document.getElementById('ci-'+type+'-'+id);
  if(!inp||!inp.value.trim())return;
  var t=inp.value.trim();
  var arr=type==='qt'?qtPosts:prPosts;
  var it=arr.find(function(x){return x.id===String(id);});
  if(!it)return;

  // 낙관적 업데이트 (임시 ID)
  var tempId='t'+Date.now();
  if(!it.comments)it.comments=[];
  var tempCmt={id:tempId,a:CU.id,t:t,d:td()};
  it.comments.push(tempCmt);
  inp.value='';
  type==='qt'?renderQt():renderPrayer();

  // 서버 저장
  try{
    var res=await gas('addComment',type,id,CU.id,t);
    // 성공 시 임시 ID를 실제 ID로 교체
    if(res&&res.id){
      var cmt=it.comments.find(function(c){return c.id===tempId;});
      if(cmt)cmt.id=res.id;
    }
  }catch(e){
    // 실패 시 임시 댓글 제거
    it.comments=it.comments.filter(function(c){return c.id!==tempId;});
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 저장 실패, 다시 시도해주세요','error');
  }
}

// 🚀 CHANGED: 댓글 삭제 — 실패 시 복구
async function delCm(cid,type){
  var arr=type==='qt'?qtPosts:prPosts;
  // 원래 상태 백업
  var backup=[];
  arr.forEach(function(p){if(p.comments){p.comments.forEach(function(c){if(c.id===cid)backup.push({postId:p.id,cmt:JSON.parse(JSON.stringify(c))});});}});

  // 낙관적 삭제
  arr.forEach(function(p){if(p.comments)p.comments=p.comments.filter(function(c){return c.id!==cid;});});
  type==='qt'?renderQt():renderPrayer();

  try{
    await gas('deleteComment',cid,CU.id);
  }catch(e){
    // 실패 시 복구
    backup.forEach(function(b){
      var p=arr.find(function(x){return x.id===b.postId;});
      if(p){if(!p.comments)p.comments=[];p.comments.push(b.cmt);}
    });
    type==='qt'?renderQt():renderPrayer();
    showToast('댓글 삭제 실패, 다시 시도해주세요','error');
  }
}

// 🚀 CHANGED: 성경 체크 — 즉시 저장 + 실패 시 복구 + 중복 클릭 방지
async function toggleCh(bi,ch){
  var k=bi+'-'+ch;
  // 이미 저장 중이면 무시 (중복 클릭 방지)
  if(savingChapters[k])return;

  var bp=AD.myBibleProgress,abp=AD.allBibleProgress;
  var wasChecked=bp.indexOf(k)>-1;

  // 낙관적 업데이트: 화면 먼저 반영
  if(wasChecked){
    var idxs=[];bp.forEach(function(v,i){if(v===k)idxs.push(i);});
    for(var i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
    if(abp[CU.id]){var ai=[];abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});for(var i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);}
  }else{
    bp.push(k);
    if(!abp[CU.id])abp[CU.id]=[];
    abp[CU.id].push(k);
  }
  savingChapters[k]=true;
  showToast('저장 중...');
  renderBible();

  // 서버 저장
  try{
    await gas('toggleBibleChapter',CU.id,k);
    delete savingChapters[k];
    showToast('저장됨','success');
    renderBible();
  }catch(e){
    // 실패 시 복구
    delete savingChapters[k];
    if(wasChecked){
      // 원래 체크되어 있던 것 → 다시 추가
      bp.push(k);
      if(!abp[CU.id])abp[CU.id]=[];
      abp[CU.id].push(k);
    }else{
      // 원래 체크 안 되어 있던 것 → 제거
      var idxs=[];bp.forEach(function(v,i){if(v===k)idxs.push(i);});
      for(var i=idxs.length-1;i>=0;i--)bp.splice(idxs[i],1);
      if(abp[CU.id]){var ai=[];abp[CU.id].forEach(function(v,i){if(v===k)ai.push(i);});for(var i=ai.length-1;i>=0;i--)abp[CU.id].splice(ai[i],1);}
    }
    showToast('저장 실패, 다시 시도해주세요','error');
    renderBible();
  }
}

// 🚀 CHANGED: 챌린지 참여 — 전체 리로드 제거
async function joinCh(id){

    renderBible();

    hideSub();
    alert('참여 실패. 다시 시도해주세요.');
  }

// 🚀 CHANGED: 챌린지 삭제 — 전체 리로드 제거
async function deleteCh(id){
  if(!confirm('삭제하시겠습니까?'))return;
  showSub('삭제 중...');
  try{
    await gas('deleteChallenge',id,CU.id);

    renderBible();

    hideSub();
    alert('삭제 실패. 다시 시도해주세요.');
  }
}

// 🚀 CHANGED: 챌린지 완료 — 전체 리로드 제거
async function completeCh(id){
  if(!confirm('챌린지를 완료 처리하시겠습니까?'))return;
  showSub('완료 처리 중...');

    await gas('completeChallenge',id,CU.id);

function editProfile(){var eo=EMOJIS.map(function(e){return '<button class="emoji-opt'+(CU.emoji===e?' sel':'')+'" onclick="document.querySelectorAll(\'.emoji-opt\').forEach(function(b){b.classList.remove(\'sel\');});this.classList.add(\'sel\');document.getElementById(\'edE\').value=\''+e+'\'" style="width:36px;height:36px;font-size:16px">'+e+'</button>';}).join('');showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>⚙️ 프로필</h3><input type="hidden" id="edE" value="'+CU.emoji+'"><div class="fg"><label class="q-label">이모지</label><div class="emoji-grid">'+eo+'</div></div><div class="fg"><label class="q-label">소개</label><input class="input-field" id="edB" value="'+(CU.bio||'')+'"></div><div class="fg"><label class="q-label">비밀번호 변경</label><input class="input-field" id="edP" type="password" placeholder="변경 시만"></div><button class="btn-primary" onclick="saveProfile()">저장</button>');}
async function saveProfile(){showSub('저장 중...');var e=document.getElementById('edE').value,b=document.getElementById('edB').value,p=document.getElementById('edP').value;await gas('updateProfile',CU.id,e,b,p||null);CU.emoji=e;CU.bio=b;document.getElementById('profileBtn').textContent=e;hideSub();closePopup();renderMyPage();}

// ===== 📢 공지사항 =====
function updateNoticeDot(){
  var notices=AD&&AD.notices?AD.notices:[];
  var lastRead=localStorage.getItem('yeorin_notice_read')||'2000-01-01';
  var hasNew=notices.some(function(n){return n.date>lastRead;});
  document.getElementById('noticeDot').style.display=hasNew?'block':'none';
}
function showNoticeList(){
  localStorage.setItem('yeorin_notice_read',td());
  document.getElementById('noticeDot').style.display='none';
  var notices=AD&&AD.notices?AD.notices:[];
  var items='';
  if(!notices.length)items='<div style="text-align:center;padding:24px;color:var(--b5)">공지사항이 없어요</div>';
  else items=notices.map(function(n){var m=gm(n.authorId);var own=n.authorId===CU.id;var pin=n.pinned==='Y';
    return '<div style="border-bottom:1px solid var(--b1);padding:14px 0"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+(pin?'<span style="font-size:11px;padding:2px 8px;border-radius:6px;background:var(--coral);color:#fff;font-weight:600">📌 고정</span>':'')+'<span style="font-size:15px;font-weight:700">'+n.title+'</span></div><div style="font-size:14px;color:#4A3F35;line-height:1.6;margin-bottom:4px">'+n.content.replace(/\n/g,'<br>')+'</div><div style="font-size:11px;color:var(--b5)">'+m.emoji+' '+m.name+' · '+n.date+'</div></div>'+(own?'<div style="display:flex;gap:4px;margin-left:8px;flex-shrink:0"><button onclick="editNotice(\''+n.id+'\')" style="padding:6px 10px;border-radius:6px;border:none;background:var(--b1);font-size:12px;cursor:pointer">✏️</button><button onclick="delNotice(\''+n.id+'\')" style="padding:6px 10px;border-radius:6px;border:none;background:#E8D4D4;color:#6E2E2E;font-size:12px;cursor:pointer">🗑</button></div>':'')+'</div></div>';}).join('');
  showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>📢 공지사항</h3>'+items+'<button class="btn-dashed" style="margin-top:14px" onclick="closePopup();showNoticeForm()">📝 공지 작성</button>');
}
function showNoticeForm(editData){
  var isEdit=editData&&editData.id;
  showPopup('<button class="popup-close" onclick="closePopup()">✕</button><h3>'+(isEdit?'✏️ 공지 수정':'📝 공지 작성')+'</h3><div class="fg"><label class="q-label">제목</label><input class="input-field" id="ntTitle" value="'+(isEdit?editData.title:'')+'"></div><div class="fg"><label class="q-label">내용</label><textarea class="input-field" id="ntContent" rows="4" style="resize:none">'+(isEdit?editData.content:'')+'</textarea></div><div class="fg"><label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--b7);cursor:pointer"><input type="checkbox" id="ntPinned"'+(isEdit&&editData.pinned==='Y'?' checked':'')+' style="accent-color:var(--b7)"> 📌 상단 고정</label></div><button class="btn-primary" onclick="'+(isEdit?'saveNoticeEdit(\''+editData.id+'\')':'submitNotice()')+'">저장</button>');
}
async function submitNotice(){
  var t=document.getElementById('ntTitle').value,c=document.getElementById('ntContent').value,p=document.getElementById('ntPinned').checked;
  if(!t||!c){alert('제목과 내용을 입력해주세요');return;}
  showSub('공지 등록 중...');await gas('addNotice',CU.id,t,c,p);AD.notices=await gas('getNotices');hideSub();closePopup();showNoticeList();
}
function editNotice(nid){
  var n=(AD.notices||[]).find(function(x){return x.id===nid;});if(!n)return;
  closePopup();setTimeout(function(){showNoticeForm(n);},200);
}
async function saveNoticeEdit(nid){
  var t=document.getElementById('ntTitle').value,c=document.getElementById('ntContent').value,p=document.getElementById('ntPinned').checked;
  if(!t||!c){alert('제목과 내용을 입력해주세요');return;}
  showSub('수정 중...');await gas('updateNotice',nid,CU.id,t,c,p);AD.notices=await gas('getNotices');hideSub();closePopup();showNoticeList();
}
async function delNotice(nid){
  if(!confirm('이 공지를 삭제하시겠습니까?'))return;
  showSub('삭제 중...');await gas('deleteNotice',nid,CU.id);AD.notices=await gas('getNotices');hideSub();closePopup();showNoticeList();
}

// ===== 여린이 AI =====
// 🚀 NEW: 로딩 메시지 순환 시스템
var yeorinLoadingTimer=null;
function startYeorinLoading(el,messages,style){
  var idx=0;
  function show(){
    var msg=messages[idx];
    if(style==='inline'){
      el.innerHTML='<div style="padding:10px;text-align:center"><div class="spinner" style="margin:0 auto;width:20px;height:20px;border-width:2px"></div><div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:600;transition:opacity .3s">'+msg+'</div></div>';
    }else{
      el.innerHTML='<div class="card" style="border-left:4px solid var(--green)"><div style="text-align:center;padding:8px 0"><img class="yeorin-img-lg" src="'+YIMG+'" style="height:40px;animation:pulse 1.5s infinite"><div style="font-size:14px;font-weight:700;color:var(--green);margin-top:10px;transition:opacity .3s">'+msg+'</div><div class="spinner" style="margin:12px auto 4px;width:22px;height:22px;border-width:2px"></div></div></div>';
    }
    idx=(idx+1)%messages.length;
  }
  show();
  yeorinLoadingTimer=setInterval(show,1800);
}
function stopYeorinLoading(){
  if(yeorinLoadingTimer){clearInterval(yeorinLoadingTimer);yeorinLoadingTimer=null;}
}

async function askYeorinBibleUI(bookName){
  var ch=prompt(bookName+' 몇 장이 궁금하세요? (숫자만 입력)');
  if(!ch||isNaN(ch))return;
  var el=document.getElementById('yeorinBible');
  var messages=[
    '📖 '+bookName+' '+ch+'장을 펼치고 있어요',
    '✨ 이 장의 배경을 살펴보고 있어요',
    '💡 핵심 구절을 찾고 있어요',
    '🌿 따뜻하게 정리하고 있어요',
    '🕊️ 마지막으로 다듬는 중이에요'
  ];
  startYeorinLoading(el,messages,'card');
  try{
    var res=await gas('askYeorinBible',bookName,parseInt(ch));
    stopYeorinLoading();
    el.innerHTML='<div class="card" style="border-left:4px solid var(--green)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><img class="yeorin-img-lg" src="'+YIMG+'"><span style="font-size:14px;font-weight:700;color:var(--green)">여린이의 '+bookName+' '+ch+'장 해설</span></div><div style="font-size:14px;line-height:1.7;color:#4A3F35;white-space:pre-wrap">'+res+'</div></div>';
  }catch(e){
    stopYeorinLoading();
    el.innerHTML='<div class="card" style="border-left:4px solid var(--coral)"><div style="font-size:13px;color:var(--coral)">여린이가 잠시 쉬고 있어요. 다시 시도해주세요.</div></div>';
  }
}

    stopYeorinLoading();
