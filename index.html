async function submitNeighborForm(){
  const id=document.getElementById('nfId').value;
  const name=document.getElementById('nfName').value.trim();
  const category=document.getElementById('nfCat').value;
  const customCategory=category==='other'?(document.getElementById('nfCustomCat').value.trim()):'';
  const description=document.getElementById('nfDesc').value.trim();
  const supportMethod=document.getElementById('nfSupport').value.trim();
  const phone=document.getElementById('nfPhone').value.trim();
  const website=document.getElementById('nfWebsite').value.trim();

  if(!name){showToast('단체명을 입력해주세요','error');return;}

  const btn=document.getElementById('nfSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent=id?'저장 중...':'추가 중...';}

  if(id){
    // 수정
    const target=(AD.neighbors||[]).find(function(x){return x.id===id;});
    if(!target){closePopup();return;}
    const backup=Object.assign({},target);
    Object.assign(target,{name:name,category:category,customCategory:customCategory,description:description,supportMethod:supportMethod,phone:phone,website:website});
    closePopup();
    selNeighborId?renderNeighborDetail():renderNeighbors();
    showToast('저장 중...');
    try{
      await gas('updateNeighbor',id,name,category,customCategory,description,supportMethod,phone,website);
      showToast('저장 완료 ✓','success');
    }catch(e){
      Object.assign(target,backup);
      showToast('저장 실패','error');
      selNeighborId?renderNeighborDetail():renderNeighbors();
    }
  }else{
    // 추가
    const tempId='temp_'+Date.now();
    const tempNb={id:tempId,name:name,category:category,customCategory:customCategory,description:description,supportMethod:supportMethod,phone:phone,website:website,createdBy:CU.id,_pending:true};
    if(!AD.neighbors)AD.neighbors=[];
    AD.neighbors.push(tempNb);
    closePopup();
    renderNeighbors();
    showToast('추가 중...');
    try{
      const r=await gas('addNeighbor',CU.id,name,category,customCategory,description,supportMethod,phone,website);
      const idx=AD.neighbors.findIndex(function(x){return x.id===tempId;});
      if(idx>=0&&r&&r.id){
        AD.neighbors[idx].id=r.id;
        delete AD.neighbors[idx]._pending;
      }
      showToast('이웃 추가 완료 ✓','success');
      renderNeighbors();
    }catch(e){
      AD.neighbors=AD.neighbors.filter(function(x){return x.id!==tempId;});
      showToast('추가 실패','error');
      renderNeighbors();
    }
  }
}

// ===== 삭제 =====
function confirmDeleteNeighbor(id){
  const n=(AD.neighbors||[]).find(function(x){return x.id===id;});
  if(!n)return;
  if(!confirm('"'+n.name+'" 이웃을 삭제할까요?\n이 동작은 되돌릴 수 없어요.'))return;
  doDeleteNeighbor(id);
}

async function doDeleteNeighbor(id){
  const idx=(AD.neighbors||[]).findIndex(function(x){return x.id===id;});
  if(idx<0)return;
  const backup=AD.neighbors[idx];
  AD.neighbors.splice(idx,1);
  selNeighborId=null;
  renderNeighbors();
  showToast('삭제 중...');
  try{
    await gas('deleteNeighbor',id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    AD.neighbors.push(backup);
    showToast('삭제 실패','error');
    renderNeighbors();
  }
}

function getFinCatInfo(type,catKey){
  const list=FIN_CATEGORIES[type]||FIN_CATEGORIES.income;
  return list.find(function(c){return c.key===catKey;})||list[list.length-1];
}

function fmtMoney(n){
  const num=Number(n)||0;
  return num.toLocaleString('ko-KR');
}

function fmtMoneyShort(n){
  const num=Number(n)||0;
  if(num>=10000){
    const man=num/10000;
    if(man>=1000)return(man/1000).toFixed(1).replace(/\.0$/,'')+'천만';
    if(man>=100)return Math.round(man)+'만';
    return man.toFixed(man>=10?0:1).replace(/\.0$/,'')+'만';
  }
  return num.toLocaleString('ko-KR');
}

// ===== 월별 추이 그래프 (최근 6개월) =====
function renderMonthlyTrendChart(allRecords){
  // 최근 6개월 (현재 finYear/finMonth 기준)
  const months=[];
  for(let i=5;i>=0;i--){
    let y=finYear,m=finMonth-i;
    while(m<0){m+=12;y--;}
    months.push({y:y,m:m,key:y+'-'+pd(m+1),label:(m+1)+'월'});
  }

  const data=months.map(function(mo){
    const recs=allRecords.filter(function(r){return String(r.date||'').startsWith(mo.key);});
    return{
      label:mo.label,
      income:recs.filter(function(r){return r.type==='income';}).reduce(function(s,r){return s+(Number(r.amount)||0);},0),
      expense:recs.filter(function(r){return r.type==='expense';}).reduce(function(s,r){return s+(Number(r.amount)||0);},0)
    };
  });

  const maxVal=Math.max.apply(null,data.map(function(d){return Math.max(d.income,d.expense);}));
  if(maxVal===0){
    return ''; // 데이터 0이면 그래프 생략
  }

  // SVG 차원
  const W=320,H=160;
  const padL=8,padR=8,padT=10,padB=24;
  const chartW=W-padL-padR;
  const chartH=H-padT-padB;
  const groupW=chartW/data.length;
  const barW=Math.min(14,(groupW-6)/2);
  const gap=2;

  let bars='';
  let labels='';
  data.forEach(function(d,i){
    const cx=padL+groupW*i+groupW/2;
    const incH=d.income>0?(d.income/maxVal)*chartH:0;
    const expH=d.expense>0?(d.expense/maxVal)*chartH:0;
    const incX=cx-barW-gap/2;
    const expX=cx+gap/2;
    const incY=padT+chartH-incH;
    const expY=padT+chartH-expH;

    if(incH>0)bars+='<rect x="'+incX+'" y="'+incY+'" width="'+barW+'" height="'+incH+'" fill="#4D8556" rx="2"></rect>';
    if(expH>0)bars+='<rect x="'+expX+'" y="'+expY+'" width="'+barW+'" height="'+expH+'" fill="#C07050" rx="2"></rect>';

    labels+='<text x="'+cx+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#8A9485" font-weight="700">'+d.label+'</text>';
  });

  // 가로 격자선 (4분할)
  let grid='';
  for(let i=1;i<=3;i++){
    const y=padT+(chartH/4)*i;
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#E6ECE0" stroke-width="1" stroke-dasharray="2,3"></line>';
  }
  // 베이스라인
  grid+='<line x1="'+padL+'" y1="'+(padT+chartH)+'" x2="'+(W-padR)+'" y2="'+(padT+chartH)+'" stroke="#C8D4C0" stroke-width="1.5"></line>';

  // 최댓값 표기
  const maxLabel='<text x="'+(W-padR-2)+'" y="'+(padT+8)+'" text-anchor="end" font-size="9" fill="#B0B8AA" font-weight="700">'+fmtMoneyShort(maxVal)+'</text>';

  return '<div class="fin-chart-card">'
    +'<div class="fin-chart-title">📊 최근 6개월 수입·지출</div>'
    +'<svg class="fin-chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'
    +grid+bars+labels+maxLabel
    +'</svg>'
    +'<div class="fin-chart-legend">'
    +'<span><span class="lg-dot" style="background:#4D8556"></span>수입</span>'
    +'<span><span class="lg-dot" style="background:#C07050"></span>지출</span>'
    +'</div>'
    +'</div>';
}

// ===== 카테고리 막대 그래프 =====
function renderCategoryBars(monthRecs,type,total){
  const recs=monthRecs.filter(function(r){return r.type===type;});
  if(recs.length===0)return'';

  // 카테고리별 합계
  const catSums={};
  recs.forEach(function(r){
    const key=r.category==='other'&&r.customCategory?'other__'+r.customCategory:(r.category||'other');
    if(!catSums[key])catSums[key]={amount:0,record:r};
    catSums[key].amount+=Number(r.amount)||0;
  });

  const items=Object.keys(catSums).map(function(k){
    const v=catSums[k];
    let label,color;
    if(k.indexOf('other__')===0){
      label=k.slice(7);
      color=getFinCatInfo(type,'other').color;
    }else{
      const cat=getFinCatInfo(type,k);
      label=cat.label;
      color=cat.color;
    }
    return{label:label,amount:v.amount,color:color,pct:total>0?(v.amount/total)*100:0};
  }).sort(function(a,b){return b.amount-a.amount;});

  let bars='';
  items.forEach(function(it){
    bars+='<div class="fin-catbar">'
      +'<div class="cb-label">'+escapeHtml(it.label)+'</div>'
      +'<div class="cb-track"><div class="cb-fill" style="width:'+it.pct.toFixed(1)+'%;background:'+it.color+'"></div></div>'
      +'<div class="cb-amt">'+fmtMoney(it.amount)+'원</div>'
      +'</div>';
  });

  return '<div class="fin-chart-card">'
    +'<div class="fin-chart-title">'+(type==='income'?'📥 이번 달 수입 카테고리':'📤 이번 달 지출 카테고리')+'</div>'
    +'<div class="fin-catbars">'+bars+'</div>'
    +'</div>';
}

function renderFinCatSelect(type,curCat,curCustom){
  const cats=FIN_CATEGORIES[type]||FIN_CATEGORIES.income;
  const opts=cats.map(function(c){
    return '<option value="'+c.key+'"'+(curCat===c.key?' selected':'')+'>'+c.icon+' '+c.label+'</option>';
  }).join('');
  return '<select class="select-field" id="ffCat" onchange="onFinCatChange()">'+opts+'</select>'
    +'<div id="ffCustomWrap" style="display:'+(curCat==='other'?'block':'none')+';margin-top:6px"><input class="input-field" id="ffCustomCat" value="'+escapeHtml(curCustom||'')+'" placeholder="카테고리 직접 입력"></div>';
}

function setFinFormType(type){
  _finFormType=type;
  document.getElementById('ffType').value=type;
  document.getElementById('ff-type-income').className=(type==='income'?'active income':'');
  document.getElementById('ff-type-expense').className=(type==='expense'?'active expense':'');
  // 카테고리 select 다시 그리기 (현재 값 유지 시도하되, 없으면 첫 항목)
  const cats=FIN_CATEGORIES[type];
  document.getElementById('ffCatWrap').innerHTML=renderFinCatSelect(type,cats[0].key,'');
}

function onFinCatChange(){
  const sel=document.getElementById('ffCat');
  const wrap=document.getElementById('ffCustomWrap');
  if(!sel||!wrap)return;
  wrap.style.display=sel.value==='other'?'block':'none';
}

function onFinAmountInput(input){
  // 숫자만 추출
  const raw=input.value.replace(/[^\d]/g,'');
  if(!raw){input.value='';return;}
  const num=parseInt(raw,10);
  input.value=num.toLocaleString('ko-KR');
}

async function submitFinanceForm(){
  const id=document.getElementById('ffId').value;
  const type=document.getElementById('ffType').value;
  const date=document.getElementById('ffDate').value;
  const category=document.getElementById('ffCat').value;
  const customCategory=category==='other'?(document.getElementById('ffCustomCat').value.trim()):'';
  const amountRaw=document.getElementById('ffAmount').value.replace(/[^\d]/g,'');
  const amount=parseInt(amountRaw,10)||0;
  const memo=document.getElementById('ffMemo').value.trim();

  if(!date){showToast('날짜를 선택해주세요','error');return;}
  if(!amount||amount<=0){showToast('금액을 올바르게 입력해주세요','error');return;}

  const btn=document.getElementById('ffSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent=id?'저장 중...':'추가 중...';}

  if(id){
    // 수정
    const target=(AD.finance||[]).find(function(x){return x.id===id;});
    if(!target){closePopup();return;}
    const backup=Object.assign({},target);
    Object.assign(target,{date:date,type:type,category:category,customCategory:customCategory,amount:amount,memo:memo});
    closePopup();
    renderFinance();
    showToast('저장 중...');
    try{
      await gas('updateFinance',id,date,type,category,customCategory,amount,memo);
      showToast('저장 완료 ✓','success');
    }catch(e){
      Object.assign(target,backup);
      showToast('저장 실패','error');
      renderFinance();
    }
  }else{
    // 추가
    const tempId='temp_'+Date.now();
    const tempRec={id:tempId,date:date,type:type,category:category,customCategory:customCategory,amount:amount,memo:memo,createdBy:CU.id,_pending:true};
    if(!AD.finance)AD.finance=[];
    AD.finance.push(tempRec);
    closePopup();
    // 추가한 거래의 월로 이동
    const dt=new Date(date);
    finYear=dt.getFullYear();
    finMonth=dt.getMonth();
    renderFinance();
    showToast('추가 중...');
    try{
      const r=await gas('addFinance',CU.id,date,type,category,customCategory,amount,memo);
      const idx=AD.finance.findIndex(function(x){return x.id===tempId;});
      if(idx>=0&&r&&r.id){
        AD.finance[idx].id=r.id;
        delete AD.finance[idx]._pending;
      }
      showToast('거래 추가 완료 ✓','success');
      renderFinance();
    }catch(e){
      AD.finance=AD.finance.filter(function(x){return x.id!==tempId;});
      showToast('추가 실패','error');
      renderFinance();
    }
  }
}

// ===== 삭제 =====
function confirmDeleteFinance(id){
  const r=(AD.finance||[]).find(function(x){return x.id===id;});
  if(!r)return;
  const cat=getFinCatInfo(r.type,r.category);
  const catLabel=r.category==='other'&&r.customCategory?r.customCategory:cat.label;
  if(!confirm('"'+catLabel+' '+fmtMoney(r.amount)+'원" 거래를 삭제할까요?\n이 동작은 되돌릴 수 없어요.'))return;
  doDeleteFinance(id);
}

async function doDeleteFinance(id){
  const idx=(AD.finance||[]).findIndex(function(x){return x.id===id;});
  if(idx<0)return;
  const backup=AD.finance[idx];
  AD.finance.splice(idx,1);
  closePopup();
  renderFinance();
  showToast('삭제 중...');
  try{
    await gas('deleteFinance',id);
    showToast('삭제 완료 ✓','success');
  }catch(e){
    AD.finance.push(backup);
    showToast('삭제 실패','error');
    renderFinance();
  }
}

</script>
